# Build the open-infra console image and push it to GHCR.
#
# Uses the repo's built-in GITHUB_TOKEN with `packages: write`, so this works on
# a PRIVATE repo with no PAT. The image package's visibility is set separately in
# GitHub (Packages settings) — make it public for credential-free cluster pulls,
# or keep it private and add an imagePullSecret.
name: build-console

on:
  push:
    branches: [main]
    paths:
      - "ui/**"
      - "console-api/**"
      - ".github/workflows/build-console.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing (Sigstore OIDC)
  security-events: write # upload Trivy results to the Security tab

concurrency:
  group: build-console-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase owner is required by GHCR; repository_owner is already lc here.
          images: ghcr.io/${{ github.repository_owner }}/open-infra-console
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          # Build context is the repo root so the Dockerfile can pull in both
          # ui/ (SPA build) and console-api/ (Go build that embeds the SPA).
          context: .
          file: console-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Supply chain: scan + sign the pushed image ---
      - name: Trivy vulnerability scan (SARIF)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/open-infra-console@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: "true"
        env:
          # Cache the vuln DB across runs; avoids rate-limited DB pulls.
          TRIVY_CACHE_DIR: .trivycache

      - name: Upload Trivy results to the Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-console

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless, Sigstore)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/open-infra-console@${{ steps.build.outputs.digest }}
