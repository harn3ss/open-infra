# Cut a versioned, signed release of the console + apply-sink images.
#
# Triggered by pushing a semver tag (e.g. v1.0.0), or manually (workflow_dispatch)
# against an existing tag to (re)build a release. Each image is published to GHCR
# tagged with the version (1.0.0, 1.0, latest) and cosign-signed (keyless, Sigstore).
# The day-to-day build-* workflows only emit latest/sha on pushes to main; this one
# produces the version-pinned release packages for reproducible deploys.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # dispatch against a tag ref to (re)build that release

permissions:
  contents: read
  packages: write
  id-token: write # cosign keyless signing (Sigstore OIDC)

jobs:
  # Gate: no image is built or signed unless the full test suite passes on this ref.
  test:
    uses: ./.github/workflows/test.yml

  package:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: open-infra-console
            context: .
            file: console-api/Dockerfile
          - image: open-infra-apply-sink
            context: apply-sink
            file: apply-sink/Dockerfile
    name: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (version tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          # v1.0.0 -> 1.0.0, 1.0, latest
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the image (keyless, Sigstore)
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
