# open-infra/deploy-action — the "deploy on push" experience.
# Users add ~10 lines to their workflow; this builds the image, pushes it,
# validates infra.yaml, renders the Application CR, and commits it to the
# GitOps state repo. Argo CD + Crossplane do the rest.
name: open-infra deploy
description: Build an app image and reconcile its infra.yaml into an open-infra cluster.
branding: { icon: upload-cloud, color: blue }

inputs:
  manifest:
    description: Path to the app's infra.yaml
    default: infra.yaml
  registry:
    description: Container registry host
    default: ghcr.io
  image:
    description: "Image repo (default: <registry>/<owner>/<repo>)"
    required: false
  gitops-repo:
    description: GitOps state repo (owner/name) that Argo watches
    required: true
  gitops-token:
    description: Token with write access to the GitOps repo
    required: true
  gitops-path:
    description: Path within the GitOps repo to write the rendered CR
    default: apps

runs:
  using: composite
  steps:
    - name: Resolve image ref
      id: img
      shell: bash
      run: |
        IMAGE="${{ inputs.image }}"
        [ -n "$IMAGE" ] || IMAGE="${{ inputs.registry }}/${GITHUB_REPOSITORY,,}"
        echo "ref=${IMAGE}:${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

    - name: Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ github.actor }}
        password: ${{ inputs.gitops-token }}

    - name: Build & push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: ${{ steps.img.outputs.ref }}

    - name: Validate manifest
      shell: bash
      run: |
        test -f "${{ inputs.manifest }}" || { echo "::error::${{ inputs.manifest }} not found"; exit 1; }
        grep -q "kind: Application" "${{ inputs.manifest }}" || { echo "::error::not an open-infra Application"; exit 1; }
        # TODO: validate against the published JSON schema (kubeconform + openinfra CRD).

    - name: Render Application CR with the new image tag
      id: render
      shell: bash
      run: |
        APP=$(awk '/^  name:/{print $2; exit}' "${{ inputs.manifest }}")
        mkdir -p out
        # Pin the freshly-built image (replace the tag in the committed CR).
        sed -E "s#(image:[[:space:]]*)\S+#\1${{ steps.img.outputs.ref }}#" \
          "${{ inputs.manifest }}" > "out/${APP}.yaml"
        echo "app=$APP" >> "$GITHUB_OUTPUT"

    - name: Commit to GitOps repo
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gitops-token }}
      run: |
        git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ inputs.gitops-repo }}.git" gitops
        mkdir -p "gitops/${{ inputs.gitops-path }}"
        cp "out/${{ steps.render.outputs.app }}.yaml" "gitops/${{ inputs.gitops-path }}/"
        cd gitops
        git config user.name  "open-infra-bot"
        git config user.email "open-infra-bot@users.noreply.github.com"
        git add -A
        git commit -m "deploy ${{ steps.render.outputs.app }} @ ${GITHUB_SHA::12}" || { echo "no changes"; exit 0; }
        git push
