# Scenario 1 — multimaster-partition (design §5). Cut site B off the mesh mid-write.
# Blast radius: chaos-sandbox only (composition scopes the Chaos Mesh selector to this
# namespace; the pre-flight guard proves the selector matches nothing outside it).
apiVersion: openinfra.dev/v1
kind: FaultInjection
metadata:
  name: mm-partition
  namespace: chaos-sandbox
spec:
  type: network-partition
  target:
    labelSelector: { app: pg, site: b }
  # The mesh is POD-MEDIATED (pg → Debezium → NATS → apply-sink → pg), so cutting
  # pg-a↔pg-b directly does nothing — replication never flows member-to-member. To
  # actually sever it we cut site B from the engine pod that applies A's changes into
  # it (the a→b apply-sink). B keeps accumulating local writes and stops receiving A's
  # for the fault window, then must re-converge after heal. Both DBs stay reachable by
  # the harness (the sink is the only peer), so writes are driven through the cut.
  # Verified: this yields a real ~90s diverge-then-converge (a member-to-member peer
  # completed in 13s — i.e. injected nothing). Bidirectional isolation (also cut the
  # b Debezium) is a refinement once partitionPeer accepts multiple selectors.
  partitionPeer: { app: chaos-mesh-pg-repl-a-b-sink }
  mode: all
  direction: both
  duration: 90s
