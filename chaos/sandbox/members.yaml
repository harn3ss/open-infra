# Nightly Chaos Suite — Scenario 1 disposable members (design §3, layer 1).
# Two throwaway Postgres "sites" in the sandbox, seeded by the harness. The data here
# is DESIGNED to be destroyed — worst case (total corruption) costs nothing real.
# wal_level=logical so the Replication engine's Debezium capture can read them.
# Labeled app=pg / site={a,b}: the partition fault selects one site by these labels.
apiVersion: v1
kind: Secret
metadata: { name: pg-creds, namespace: chaos-sandbox }
stringData: { password: chaosbox }
---
apiVersion: v1
kind: Service
metadata: { name: pg-a, namespace: chaos-sandbox, labels: { app: pg, site: a } }
spec:
  selector: { app: pg, site: a }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: v1
kind: Service
metadata: { name: pg-b, namespace: chaos-sandbox, labels: { app: pg, site: b } }
spec:
  selector: { app: pg, site: b }
  ports: [{ port: 5432, targetPort: 5432 }]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: pg-a, namespace: chaos-sandbox, labels: { app: pg, site: a } }
spec:
  serviceName: pg-a
  replicas: 1
  selector: { matchLabels: { app: pg, site: a } }
  template:
    metadata: { labels: { app: pg, site: a } }
    spec:
      priorityClassName: chaos-sandbox-low
      terminationGracePeriodSeconds: 5
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]
          env:
            - { name: POSTGRES_DB, value: app }
            - { name: POSTGRES_USER, value: app }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: pg-creds, key: password } } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432 }]
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: "1", memory: 512Mi } }
          readinessProbe: { exec: { command: [sh, -c, "pg_isready -U app -d app"] }, initialDelaySeconds: 5, periodSeconds: 5 }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }] # ephemeral on purpose — this is a sandbox
---
apiVersion: apps/v1
kind: StatefulSet
metadata: { name: pg-b, namespace: chaos-sandbox, labels: { app: pg, site: b } }
spec:
  serviceName: pg-b
  replicas: 1
  selector: { matchLabels: { app: pg, site: b } }
  template:
    metadata: { labels: { app: pg, site: b } }
    spec:
      priorityClassName: chaos-sandbox-low
      terminationGracePeriodSeconds: 5
      containers:
        - name: postgres
          image: postgres:16-alpine
          args: ["-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]
          env:
            - { name: POSTGRES_DB, value: app }
            - { name: POSTGRES_USER, value: app }
            - { name: POSTGRES_PASSWORD, valueFrom: { secretKeyRef: { name: pg-creds, key: password } } }
            - { name: PGDATA, value: /var/lib/postgresql/data/pgdata }
          ports: [{ containerPort: 5432 }]
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: "1", memory: 512Mi } }
          readinessProbe: { exec: { command: [sh, -c, "pg_isready -U app -d app"] }, initialDelaySeconds: 5, periodSeconds: 5 }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }]
