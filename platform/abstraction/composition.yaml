# The compiler: one Application claim -> Deployment + Service + Ingress + HPA,
# plus on-demand managed services with their connection creds injected as env.
# Pipeline mode with the go-templating function keeps the fan-out readable.
#
# Implements the full user-facing schema (xrd.yaml):
#   database        -> CloudNativePG Cluster + injected DATABASE_URL
#   storage.buckets -> MinIO bucket(s) + per-app creds (MINIO_*) via a setup Job
#   queues          -> injected NATS_URL + OPENINFRA_QUEUES (streams app-declared)
#   secrets         -> envFrom each named secret
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: application
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XApplication
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $scaling := $spec.scaling | default dict }}
            ---
            # --- Deployment ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/name: {{ $name }} }
                  spec:
                    selector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
                    template:
                      metadata: { labels: { app.kubernetes.io/name: {{ $name }} } }
                      spec:
                        containers:
                          - name: app
                            image: {{ $spec.image }}
                            ports: [ { containerPort: {{ $spec.port }} } ]
                            # Requests drive the HPA; limits bound the app (tenant).
                            resources:
                              requests: { cpu: 50m, memory: 64Mi }
                              limits: { cpu: 500m, memory: 512Mi }
                            # Health checks auto-injected — k8s self-heals.
                            readinessProbe: { tcpSocket: { port: {{ $spec.port }} } }
                            livenessProbe:  { tcpSocket: { port: {{ $spec.port }} } }
                            {{- if or $spec.env $spec.database $spec.queues }}
                            env:
                            {{- range $spec.env }}
                              - { name: {{ .name }}, value: "{{ .value }}" }
                            {{- end }}
                            {{- if $spec.database }}
                              # Injected Postgres connection (CloudNativePG app secret).
                              - name: DATABASE_URL
                                valueFrom:
                                  secretKeyRef: { name: {{ $name }}-db-app, key: uri }
                            {{- end }}
                            {{- if $spec.queues }}
                              - { name: NATS_URL, value: "nats://nats.nats.svc.cluster.local:4222" }
                              - { name: OPENINFRA_QUEUES, value: "{{ join "," $spec.queues }}" }
                            {{- end }}
                            {{- end }}
                            {{- $envFrom := list }}
                            {{- if and $spec.storage $spec.storage.buckets }}{{- $envFrom = append $envFrom (printf "%s-minio" $name) }}{{- end }}
                            {{- range $spec.secrets }}{{- $envFrom = append $envFrom . }}{{- end }}
                            {{- if $envFrom }}
                            envFrom:
                            {{- range $envFrom }}
                              - secretRef: { name: {{ . }}, optional: true }
                            {{- end }}
                            {{- end }}
            ---
            # --- Service ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    selector: { app.kubernetes.io/name: {{ $name }} }
                    ports: [ { port: 80, targetPort: {{ $spec.port }} } ]
            {{- if $spec.domain }}
            ---
            # --- Ingress (Traefik) + TLS via cert-manager ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    annotations:
                      cert-manager.io/cluster-issuer: openinfra-issuer
                  spec:
                    rules:
                      - host: {{ $spec.domain }}
                        http:
                          paths:
                            - path: /
                              pathType: Prefix
                              backend: { service: { name: {{ $name }}, port: { number: 80 } } }
                    tls:
                      - hosts: [ {{ $spec.domain }} ]
                        secretName: {{ $name }}-tls
            {{- end }}
            ---
            # --- HPA ("ASG") ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: hpa
            spec:
              forProvider:
                manifest:
                  apiVersion: autoscaling/v2
                  kind: HorizontalPodAutoscaler
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ $name }} }
                    minReplicas: {{ $scaling.min | default 1 }}
                    maxReplicas: {{ $scaling.max | default 5 }}
                    metrics:
                      - type: Resource
                        resource:
                          name: cpu
                          target: { type: Utilization, averageUtilization: {{ $scaling.targetCPUPercent | default 70 }} }
            ---
            # --- Tenant isolation: per-container defaults + max size (so the
            #     count quota below never rejects a pod for missing resources) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: limitrange
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: LimitRange
                  metadata: { name: {{ $name }}-limits, namespace: {{ $ns }} }
                  spec:
                    limits:
                      - type: Container
                        max: { cpu: "4", memory: 4Gi }
                        default: { cpu: 500m, memory: 512Mi }
                        defaultRequest: { cpu: 50m, memory: 64Mi }
            ---
            # --- Tenant isolation: object-count quota (counts only — safe; never
            #     blocks pods for missing requests/limits) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: quota
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ResourceQuota
                  metadata: { name: {{ $name }}-quota, namespace: {{ $ns }} }
                  spec:
                    hard:
                      pods: "50"
                      persistentvolumeclaims: "20"
                      services: "20"
            ---
            # --- Tenant isolation: restrict ingress to the app's pods to the same
            #     namespace + the ingress controller (kube-system). Egress stays
            #     open so DNS / DB / MinIO / NATS keep working. (k3s exempts
            #     kubelet health probes, verified.) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: netpol
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata: { name: {{ $name }}-allow, namespace: {{ $ns }} }
                  spec:
                    podSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
                    policyTypes: [Ingress]
                    ingress:
                      - from:
                          # same namespace (kube-router honors namespaceSelector by
                          # the auto-applied name label, not a bare podSelector {})
                          - namespaceSelector:
                              matchLabels: { kubernetes.io/metadata.name: {{ $ns }} }
                          # the ingress controller (Traefik) so external traffic works
                          - namespaceSelector:
                              matchLabels: { kubernetes.io/metadata.name: kube-system }
            {{- if $spec.database }}
            ---
            # --- Managed Postgres ("RDS") via CloudNativePG. LOCAL NVMe only. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: database
            spec:
              forProvider:
                manifest:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata: { name: {{ $name }}-db, namespace: {{ $ns }} }
                  spec:
                    instances: 1            # 3 for prod HA
                    storage:
                      size: 5Gi
                      storageClass: local-path   # NEVER CIFS/NFS
                    bootstrap:
                      initdb: { database: {{ $spec.database.name | default $name }}, owner: app }
            {{- end }}
            {{- if and $spec.storage $spec.storage.buckets }}
            ---
            # --- Object storage ("S3"): one Job (aws-cli + kubectl in alpine/k8s)
            #     creates the bucket(s) AND writes the per-app creds secret
            #     (<name>-minio) into the app namespace. Runs in the minio namespace
            #     so MinIO root creds come from the minio secret via env — never from
            #     this Composition — and uses the pre-defined openinfra-bucket-setup
            #     SA (so the provider needs no RBAC-creation power). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: bucket-setup
            spec:
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata: { name: {{ $name }}-bucket-setup, namespace: minio }
                  spec:
                    backoffLimit: 20
                    ttlSecondsAfterFinished: 600
                    template:
                      spec:
                        serviceAccountName: openinfra-bucket-setup
                        restartPolicy: OnFailure
                        containers:
                          - name: setup
                            image: alpine/k8s:1.30.0
                            env:
                              - name: AWS_ACCESS_KEY_ID
                                valueFrom: { secretKeyRef: { name: minio, key: rootUser } }
                              - name: AWS_SECRET_ACCESS_KEY
                                valueFrom: { secretKeyRef: { name: minio, key: rootPassword } }
                              - name: AWS_DEFAULT_REGION
                                value: us-east-1
                            command: ["/bin/sh", "-c"]
                            args:
                              - 'for b in {{ range $spec.storage.buckets }}{{ . }} {{ end }}; do aws --endpoint-url http://minio.minio.svc.cluster.local:9000 s3 mb "s3://$b" 2>/dev/null || true; done; kubectl create secret generic {{ $name }}-minio -n {{ $ns }} --from-literal=MINIO_ENDPOINT=http://minio.minio.svc.cluster.local:9000 --from-literal=MINIO_BUCKETS={{ join "," $spec.storage.buckets }} --from-literal=MINIO_ACCESS_KEY="$AWS_ACCESS_KEY_ID" --from-literal=MINIO_SECRET_KEY="$AWS_SECRET_ACCESS_KEY" --dry-run=client -o yaml | kubectl apply -f -'
            {{- end }}
            # NOTE: queues (NATS_URL/OPENINFRA_QUEUES) and secrets (envFrom) are
            # injected into the Deployment above; NATS streams are app-declared.
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready   # marks the XR ready when composed resources are
