# The compiler: one Application claim -> Deployment + Service + Ingress + HPA,
# plus on-demand managed services with their connection creds injected as env.
# Pipeline mode with the go-templating function keeps the fan-out readable.
#
# Implements the full user-facing schema (xrd.yaml):
#   database (postgres) -> CloudNativePG Cluster + injected DATABASE_URL
#   database (mongo)    -> FerretDB + DocumentDB-Postgres + injected MONGODB_URI
#   storage.buckets -> MinIO bucket(s) + per-app creds (MINIO_*) via a setup Job
#   queues          -> injected NATS_URL + OPENINFRA_QUEUES (streams app-declared)
#   secrets         -> envFrom each named secret
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: application
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XApplication
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $scaling := $spec.scaling | default dict }}
            {{- /* database.engine: postgres (CloudNativePG) or mongo (FerretDB on
                   the DocumentDB-Postgres extension). dbPass is derived from the
                   composite UID so it's stable across reconciles (never committed). */}}
            {{- $dbEngine := "" }}
            {{- if $spec.database }}{{ $dbEngine = ($spec.database.engine | default "postgres") }}{{- end }}
            {{- $dbName := "" }}
            {{- if $spec.database }}{{ $dbName = ($spec.database.name | default $name) }}{{- end }}
            {{- $dbPass := .observed.composite.resource.metadata.uid | sha256sum | trunc 24 }}
            {{- $dbRootPass := printf "%s-root" .observed.composite.resource.metadata.uid | sha256sum | trunc 24 }}
            {{- /* The workload (Deployment/Service/Ingress/HPA) renders only when an
                   image is given. An Application may be database-only — just declare
                   a `database:` block and the platform provisions the DB, no app. */}}
            {{- if $spec.image }}
            ---
            # --- Deployment ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/name: {{ $name }} }
                  spec:
                    selector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
                    template:
                      metadata: { labels: { app.kubernetes.io/name: {{ $name }} } }
                      spec:
                        containers:
                          - name: app
                            image: {{ $spec.image }}
                            ports: [ { containerPort: {{ $spec.port }} } ]
                            # Requests drive the HPA; limits bound the app (tenant).
                            resources:
                              requests: { cpu: 50m, memory: 64Mi }
                              limits: { cpu: 500m, memory: 512Mi }
                            # Health checks auto-injected — k8s self-heals.
                            readinessProbe: { tcpSocket: { port: {{ $spec.port }} } }
                            livenessProbe:  { tcpSocket: { port: {{ $spec.port }} } }
                            {{- if or $spec.env $spec.database $spec.queues }}
                            env:
                            {{- range $spec.env }}
                              - { name: {{ .name }}, value: "{{ .value }}" }
                            {{- end }}
                            {{- if $spec.database }}
                            {{- if eq $dbEngine "mongo" }}
                              # Injected MongoDB connection (FerretDB endpoint).
                              - name: MONGODB_URI
                                valueFrom:
                                  secretKeyRef: { name: {{ $name }}-mongo-app, key: MONGODB_URI }
                            {{- else if eq $dbEngine "mysql" }}
                              # Injected MySQL connection (MariaDB endpoint).
                              - name: DATABASE_URL
                                valueFrom:
                                  secretKeyRef: { name: {{ $name }}-mysql-app, key: DATABASE_URL }
                            {{- else }}
                              # Injected Postgres connection (CloudNativePG app secret).
                              - name: DATABASE_URL
                                valueFrom:
                                  secretKeyRef: { name: {{ $name }}-db-app, key: uri }
                            {{- end }}
                            {{- end }}
                            {{- if $spec.queues }}
                              - { name: NATS_URL, value: "nats://nats.nats.svc.cluster.local:4222" }
                              - { name: OPENINFRA_QUEUES, value: "{{ join "," $spec.queues }}" }
                            {{- end }}
                            {{- end }}
                            {{- $envFrom := list }}
                            {{- if and $spec.storage $spec.storage.buckets }}{{- $envFrom = append $envFrom (printf "%s-minio" $name) }}{{- end }}
                            {{- range $spec.secrets }}{{- $envFrom = append $envFrom . }}{{- end }}
                            {{- if $envFrom }}
                            envFrom:
                            {{- range $envFrom }}
                              - secretRef: { name: {{ . }}, optional: true }
                            {{- end }}
                            {{- end }}
            ---
            # --- Service ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    selector: { app.kubernetes.io/name: {{ $name }} }
                    ports: [ { port: 80, targetPort: {{ $spec.port }} } ]
            {{- if $spec.expose }}
            ---
            # --- LAN LoadBalancer (MetalLB): the app's port on a LAN IP, for raw
            #     TCP / non-HTTP / no-DNS access (alongside any Ingress). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: app-lan
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $name }}-lan
                    namespace: {{ $ns }}
                    labels: { openinfra.dev/app-lan: {{ $name }} }
                  spec:
                    type: LoadBalancer
                    selector: { app.kubernetes.io/name: {{ $name }} }
                    ports: [ { port: {{ $spec.port }}, targetPort: {{ $spec.port }} } ]
            {{- end }}
            {{- if $spec.domain }}
            ---
            # --- Ingress (Traefik) + TLS via cert-manager ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    annotations:
                      cert-manager.io/cluster-issuer: openinfra-issuer
                  spec:
                    rules:
                      - host: {{ $spec.domain }}
                        http:
                          paths:
                            - path: /
                              pathType: Prefix
                              backend: { service: { name: {{ $name }}, port: { number: 80 } } }
                    tls:
                      - hosts: [ {{ $spec.domain }} ]
                        secretName: {{ $name }}-tls
            {{- end }}
            ---
            # --- HPA ("ASG") ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: hpa
            spec:
              forProvider:
                manifest:
                  apiVersion: autoscaling/v2
                  kind: HorizontalPodAutoscaler
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: {{ $name }} }
                    minReplicas: {{ $scaling.min | default 1 }}
                    maxReplicas: {{ $scaling.max | default 5 }}
                    metrics:
                      - type: Resource
                        resource:
                          name: cpu
                          target: { type: Utilization, averageUtilization: {{ $scaling.targetCPUPercent | default 70 }} }
            {{- end }}
            ---
            # --- Tenant isolation: per-container defaults + max size (so the
            #     count quota below never rejects a pod for missing resources) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: limitrange
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: LimitRange
                  metadata: { name: {{ $name }}-limits, namespace: {{ $ns }} }
                  spec:
                    limits:
                      # max is a safety ceiling against a runaway container, not a
                      # tenant cap (the ResourceQuota bounds total usage). Keep it
                      # generous enough for real workloads — e.g. a co-located Model's
                      # Ollama container needs 8Gi; 4Gi here rejected it at admission.
                      - type: Container
                        max: { cpu: "8", memory: 16Gi }
                        default: { cpu: 500m, memory: 512Mi }
                        defaultRequest: { cpu: 50m, memory: 64Mi }
            ---
            # --- Tenant isolation: object-count quota (counts only — safe; never
            #     blocks pods for missing requests/limits) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: quota
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ResourceQuota
                  metadata: { name: {{ $name }}-quota, namespace: {{ $ns }} }
                  spec:
                    hard:
                      pods: "50"
                      persistentvolumeclaims: "20"
                      services: "20"
            ---
            # --- Tenant isolation: restrict ingress to the app's pods to the same
            #     namespace + the ingress controller (kube-system). Egress stays
            #     open so DNS / DB / MinIO / NATS keep working. (k3s exempts
            #     kubelet health probes, verified.) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: netpol
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: NetworkPolicy
                  metadata: { name: {{ $name }}-allow, namespace: {{ $ns }} }
                  spec:
                    podSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
                    policyTypes: [Ingress]
                    ingress:
                      - from:
                          # same namespace (kube-router honors namespaceSelector by
                          # the auto-applied name label, not a bare podSelector {})
                          - namespaceSelector:
                              matchLabels: { kubernetes.io/metadata.name: {{ $ns }} }
                          # the ingress controller (Traefik) so external traffic works
                          - namespaceSelector:
                              matchLabels: { kubernetes.io/metadata.name: kube-system }
            {{- if $spec.database }}
            {{- if eq $dbEngine "mongo" }}
            ---
            # --- NoSQL ("DynamoDB"): FerretDB (Mongo wire protocol) on the
            #     DocumentDB-Postgres extension — all Apache-2.0. The stateless
            #     proxy tier scales out for HA; storage is a single Postgres for
            #     now (storage-tier failover needs DocumentDB-in-CNPG, tracked). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mongo-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-mongo-app, namespace: {{ $ns }} }
                  stringData:
                    username: app
                    password: "{{ $dbPass }}"
                    MONGODB_URI: "mongodb://app:{{ $dbPass }}@{{ $name }}-mongo.{{ $ns }}.svc.cluster.local:27017/{{ $dbName }}"
                    POSTGRESQL_URL: "postgres://app:{{ $dbPass }}@{{ $name }}-docdb.{{ $ns }}.svc.cluster.local:5432/postgres"
            ---
            # DocumentDB-Postgres data volume (local NVMe).
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: docdb-pvc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: PersistentVolumeClaim
                  metadata: { name: {{ $name }}-docdb-data, namespace: {{ $ns }} }
                  spec:
                    accessModes: [ReadWriteOnce]
                    storageClassName: local-path
                    resources: { requests: { storage: 5Gi } }
            ---
            # DocumentDB-Postgres: the storage engine FerretDB translates into.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: docdb
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}-docdb
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/name: {{ $name }}-docdb }
                  spec:
                    replicas: 1
                    strategy: { type: Recreate }
                    selector: { matchLabels: { app.kubernetes.io/name: {{ $name }}-docdb } }
                    template:
                      metadata: { labels: { app.kubernetes.io/name: {{ $name }}-docdb } }
                      spec:
                        containers:
                          - name: postgres
                            image: ghcr.io/ferretdb/postgres-documentdb:17
                            env:
                              - { name: POSTGRES_USER, value: app }
                              - { name: POSTGRES_DB, value: postgres }
                              - name: POSTGRES_PASSWORD
                                valueFrom: { secretKeyRef: { name: {{ $name }}-mongo-app, key: password } }
                            ports: [ { containerPort: 5432 } ]
                            resources:
                              requests: { cpu: 100m, memory: 256Mi }
                              limits: { cpu: "2", memory: 2Gi }
                            volumeMounts: [ { name: data, mountPath: /var/lib/postgresql/data } ]
                            readinessProbe: { exec: { command: ["pg_isready", "-U", "app"] }, initialDelaySeconds: 10, periodSeconds: 10 }
                        volumes:
                          - name: data
                            persistentVolumeClaim: { claimName: {{ $name }}-docdb-data }
            ---
            # DocumentDB-Postgres Service.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: docdb-svc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}-docdb, namespace: {{ $ns }} }
                  spec:
                    selector: { app.kubernetes.io/name: {{ $name }}-docdb }
                    ports: [ { port: 5432, targetPort: 5432 } ]
            ---
            # FerretDB proxy (stateless -> scales for HA). Speaks the Mongo protocol.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mongo
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}-mongo
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/name: {{ $name }}-mongo }
                  spec:
                    replicas: {{ if $spec.database.highAvailability }}2{{ else }}1{{ end }}
                    selector: { matchLabels: { app.kubernetes.io/name: {{ $name }}-mongo } }
                    template:
                      metadata: { labels: { app.kubernetes.io/name: {{ $name }}-mongo } }
                      spec:
                        {{- if $spec.database.highAvailability }}
                        affinity:
                          podAntiAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              - labelSelector: { matchLabels: { app.kubernetes.io/name: {{ $name }}-mongo } }
                                topologyKey: kubernetes.io/hostname
                        {{- end }}
                        containers:
                          - name: ferretdb
                            image: ghcr.io/ferretdb/ferretdb:2
                            env:
                              - name: FERRETDB_POSTGRESQL_URL
                                valueFrom: { secretKeyRef: { name: {{ $name }}-mongo-app, key: POSTGRESQL_URL } }
                            ports: [ { containerPort: 27017 } ]
                            resources:
                              requests: { cpu: 50m, memory: 128Mi }
                              limits: { cpu: "1", memory: 512Mi }
                            readinessProbe: { tcpSocket: { port: 27017 }, initialDelaySeconds: 5, periodSeconds: 10 }
            ---
            # FerretDB Service — the Mongo endpoint apps connect to (27017).
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mongo-svc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}-mongo, namespace: {{ $ns }} }
                  spec:
                    selector: { app.kubernetes.io/name: {{ $name }}-mongo }
                    ports: [ { port: 27017, targetPort: 27017 } ]
            {{- else if eq $dbEngine "mysql" }}
            ---
            # --- Relational ("RDS MySQL"): MariaDB via mariadb-operator (GPLv2 /
            #     operator MIT). highAvailability -> 3-node Galera (synchronous,
            #     auto-recovery); else a single instance. The operator owns the
            #     StatefulSet + Services (primary svc is <name>-mysql). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-mysql-app, namespace: {{ $ns }} }
                  stringData:
                    username: app
                    password: "{{ $dbPass }}"
                    rootPassword: "{{ $dbRootPass }}"
                    database: "{{ $dbName }}"
                    DATABASE_URL: "mysql://app:{{ $dbPass }}@{{ $name }}-mysql.{{ $ns }}.svc.cluster.local:3306/{{ $dbName }}"
            ---
            # MariaDB (operator CR). Operator provisions the StatefulSet, user,
            # database, and Services from these refs.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: mysql
            spec:
              forProvider:
                manifest:
                  apiVersion: k8s.mariadb.com/v1alpha1
                  kind: MariaDB
                  metadata: { name: {{ $name }}-mysql, namespace: {{ $ns }} }
                  spec:
                    rootPasswordSecretKeyRef: { name: {{ $name }}-mysql-app, key: rootPassword }
                    username: app
                    passwordSecretKeyRef: { name: {{ $name }}-mysql-app, key: password }
                    database: {{ $dbName }}
                    port: 3306
                    replicas: {{ if $spec.database.highAvailability }}3{{ else }}1{{ end }}
                    {{- if $spec.database.highAvailability }}
                    galera:
                      enabled: true
                    {{- end }}
                    storage:
                      size: 5Gi
                      storageClassName: local-path
                    resources:
                      requests: { cpu: 100m, memory: 256Mi }
                      limits: { cpu: "2", memory: 1Gi }
            {{- else }}
            ---
            # --- Managed Postgres ("RDS") via CloudNativePG. LOCAL NVMe only. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: database
            spec:
              forProvider:
                manifest:
                  apiVersion: postgresql.cnpg.io/v1
                  kind: Cluster
                  metadata: { name: {{ $name }}-db, namespace: {{ $ns }} }
                  spec:
                    # database.highAvailability -> primary + hot standby, streaming
                    # replication, automatic failover. local-path PVs are node-local,
                    # so anti-affinity (one instance per node) is what makes the DB
                    # survive a node loss — the standby is promoted automatically.
                    instances: {{ if $spec.database.highAvailability }}2{{ else }}1{{ end }}
                    {{- if $spec.database.highAvailability }}
                    affinity:
                      enablePodAntiAffinity: true
                      topologyKey: kubernetes.io/hostname
                      podAntiAffinityType: required
                    {{- end }}
                    storage:
                      size: 5Gi
                      storageClass: local-path   # NEVER CIFS/NFS
                    bootstrap:
                      initdb:
                        database: {{ $spec.database.name | default $name }}
                        owner: app
                        {{- if $spec.database.vector }}
                        # pgvector: enable vector similarity search (RAG with Models).
                        postInitApplicationSQL:
                          - CREATE EXTENSION IF NOT EXISTS vector
                        {{- end }}
            {{- end }}
            {{- end }}
            {{- if and $spec.database $spec.database.expose }}
            ---
            # --- LAN endpoint: a MetalLB LoadBalancer so workstations on the LAN
            #     can reach the database directly (psql/GUI/migrations). Consumes
            #     one pool IP — opt-in via database.expose. Targets the writable
            #     primary for postgres. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: db-lan
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $name }}-db-lan
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/part-of: {{ $name }} }
                  spec:
                    type: LoadBalancer
                    {{- if eq $dbEngine "mongo" }}
                    selector: { app.kubernetes.io/name: {{ $name }}-mongo }
                    ports: [ { port: 27017, targetPort: 27017 } ]
                    {{- else if eq $dbEngine "mysql" }}
                    selector: { app.kubernetes.io/instance: {{ $name }}-mysql, app.kubernetes.io/name: mariadb }
                    ports: [ { port: 3306, targetPort: 3306 } ]
                    {{- else }}
                    selector: { cnpg.io/cluster: {{ $name }}-db, cnpg.io/instanceRole: primary }
                    ports: [ { port: 5432, targetPort: 5432 } ]
                    {{- end }}
            {{- end }}
            {{- if and $spec.storage $spec.storage.buckets }}
            ---
            # --- Object storage ("S3"): one Job (aws-cli + kubectl in alpine/k8s)
            #     creates the bucket(s) AND writes the per-app creds secret
            #     (<name>-minio) into the app namespace. Runs in the minio namespace
            #     so MinIO root creds come from the minio secret via env — never from
            #     this Composition — and uses the pre-defined openinfra-bucket-setup
            #     SA (so the provider needs no RBAC-creation power). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: bucket-setup
            spec:
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata: { name: {{ $name }}-bucket-setup, namespace: minio }
                  spec:
                    backoffLimit: 20
                    ttlSecondsAfterFinished: 600
                    template:
                      spec:
                        serviceAccountName: openinfra-bucket-setup
                        restartPolicy: OnFailure
                        containers:
                          - name: setup
                            image: alpine/k8s:1.30.0
                            env:
                              - name: AWS_ACCESS_KEY_ID
                                valueFrom: { secretKeyRef: { name: minio, key: rootUser } }
                              - name: AWS_SECRET_ACCESS_KEY
                                valueFrom: { secretKeyRef: { name: minio, key: rootPassword } }
                              - name: AWS_DEFAULT_REGION
                                value: us-east-1
                            command: ["/bin/sh", "-c"]
                            args:
                              - 'for b in {{ range $spec.storage.buckets }}{{ . }} {{ end }}; do aws --endpoint-url http://minio.minio.svc.cluster.local:9000 s3 mb "s3://$b" 2>/dev/null || true; done; kubectl create secret generic {{ $name }}-minio -n {{ $ns }} --from-literal=MINIO_ENDPOINT=http://minio.minio.svc.cluster.local:9000 --from-literal=MINIO_BUCKETS={{ join "," $spec.storage.buckets }} --from-literal=MINIO_ACCESS_KEY="$AWS_ACCESS_KEY_ID" --from-literal=MINIO_SECRET_KEY="$AWS_SECRET_ACCESS_KEY" --dry-run=client -o yaml | kubectl apply -f -'
            {{- end }}
            # NOTE: queues (NATS_URL/OPENINFRA_QUEUES) and secrets (envFrom) are
            # injected into the Deployment above; NATS streams are app-declared.
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready   # marks the XR ready when composed resources are
