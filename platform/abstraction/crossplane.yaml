# Crossplane — the engine that compiles one Application claim into many resources.
# Installs Crossplane + the providers/functions the Composition needs. The XRD and
# Composition themselves live in abstraction/config/ and are synced by
# openinfra-config.yaml (after the CRDs from this app exist).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  source:
    repoURL: https://charts.crossplane.io/stable
    chart: crossplane
    targetRevision: 1.17.1
    helm:
      values: |
        provider:
          packages:
            # Lets the Composition create arbitrary k8s objects (Deployment, CNPG
            # Cluster, etc.) and Helm releases inside the cluster.
            - xpkg.upbound.io/crossplane-contrib/provider-kubernetes:v0.14.1
        function:
          packages:
            - xpkg.upbound.io/crossplane-contrib/function-patch-and-transform:v0.7.0
            - xpkg.upbound.io/crossplane-contrib/function-go-templating:v0.6.0
            - xpkg.upbound.io/crossplane-contrib/function-auto-ready:v0.4.0
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
