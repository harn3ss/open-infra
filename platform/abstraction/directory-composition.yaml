# The compiler for kind: Directory -> a Samba Active Directory Domain Controller
# (the open-source AD path; equivalent to AWS Directory Service "Simple AD"). It
# renders a sambacc-driven StatefulSet (the DC, provisioned headlessly from a JSON
# config), a Service exposing the AD ports (DNS/Kerberos/LDAP/SMB), and a
# connection Secret (DOMAIN/REALM/ADMIN_USER/ADMIN_PASSWORD). Windows and Linux
# machines domain-join it; the VM composition can auto-join on first boot when a
# VM sets spec.domain.
#
# Image + config grounded in the upstream samba-in-kubernetes / sambacc project:
#   - quay.io/samba.org/samba-ad-server (sambacc "addc" feature)
#   - SAMBA_CONTAINER_ID selects the config key; SAMBACC_CONFIG points at the JSON
#     (colon-separated layering: base ConfigMap + a Secret holding the password).
#   - Needs CAP_SYS_ADMIN (Samba AD DC writes NT ACLs to the security.* xattr).
#   - /var/lib/samba is the AD database; an EMPTY dir triggers provisioning, a
#     populated one just serves — so a stable PVC (StatefulSet volumeClaimTemplate)
#     is what makes restarts safe instead of wiping + re-provisioning.
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: directory
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XDirectory
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $domain := $spec.domain }}
            {{- $realm := $domain | upper }}
            {{- $netbios := (splitList "." $domain) | first | upper }}
            {{- $size := $spec.size | default "5Gi" }}
            {{- $expose := true }}{{- if hasKey $spec "expose" }}{{- $expose = $spec.expose }}{{- end }}
            {{- $admin := "Administrator" }}
            {{- /* AD password complexity needs upper+lower+digit+symbol; prefix a
                   fixed "Aa1!" onto a stable per-directory hash so provisioning
                   never fails the policy. Stable across reconciles (derived from
                   the composite UID), like the FileShare password. */}}
            {{- $pass := printf "Aa1!%s" (printf "%s-adminpass" .observed.composite.resource.metadata.uid | sha256sum | trunc 16) }}
            {{- /* The DC's stable ClusterIP, read back from the Service this
                   composition creates (populated on the reconcile after the Service
                   exists). A domain-joined VM uses it as its DNS server. */}}
            {{- $dcip := "" }}
            {{- $svc := index (.observed.resources | default dict) "service" }}
            {{- if $svc }}{{- with $svc.resource.status }}{{- with .atProvider }}{{- $dcip = (.manifest.spec.clusterIP | default "") }}{{- end }}{{- end }}{{- end }}
            {{- /* The LoadBalancer VIP, read back once MetalLB assigns it. The DC
                   auto-registers its ephemeral POD IP in AD DNS (dc1 A -> 10.42.x),
                   which no LAN client can reach and which changes on every roll; a
                   sidecar rewrites dc1/@ to this VIP so real clients resolve to a
                   reachable, stable address. Empty until the VIP exists. */}}
            {{- $vip := "" }}
            {{- if $svc }}{{- with $svc.resource.status }}{{- with .atProvider }}{{- with .manifest.status }}{{- with .loadBalancer }}{{- with .ingress }}{{- if gt (len .) 0 }}{{- $vip = ((index . 0).ip | default "") }}{{- end }}{{- end }}{{- end }}{{- end }}{{- end }}{{- end }}{{- end }}
            ---
            # sambacc config: declaratively provisions the domain. The whole config
            # lives in a Secret (not a ConfigMap) so the admin password never lands
            # in plaintext config — sambacc's multi-file SAMBACC_CONFIG does NOT
            # deep-merge (a later file's domain_settings replaces the earlier one),
            # so splitting realm/password across files drops the realm. One file.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dc-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $name }}-dc-secret
                    namespace: {{ $ns }}
                  stringData:
                    addc.json: |
                      {
                        "samba-container-config": "v0",
                        "configs": {
                          "dc1": {
                            "instance_features": ["addc"],
                            "instance_name": "DC1",
                            "domain_settings": "dom",
                            "globals": ["default"]
                          }
                        },
                        "globals": {
                          "default": {
                            "options": {
                              "rpc server dynamic port range": "49152-49164"
                            }
                          }
                        },
                        "domain_settings": {
                          "dom": {
                            "realm": "{{ $realm }}",
                            "short_domain": "{{ $netbios }}",
                            "admin_password": "{{ $pass }}"
                          }
                        }
                      }
            ---
            # The DC: a sambacc-driven Samba AD DC. StatefulSet so the /var/lib/samba
            # PVC is stable across restarts (populated dir => serve, never
            # re-provision). One replica (single-DC; multi-DC is a future addition).
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dc
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: StatefulSet
                  metadata:
                    name: {{ $name }}-dc
                    namespace: {{ $ns }}
                    labels: { app: {{ $name }}-dc, openinfra.dev/directory: "true" }
                  spec:
                    serviceName: {{ $name }}
                    replicas: 1
                    selector: { matchLabels: { app: {{ $name }}-dc } }
                    template:
                      metadata: { labels: { app: {{ $name }}-dc } }
                      spec:
                        hostname: dc1
                        containers:
                          - name: dc
                            image: quay.io/samba.org/samba-ad-server:v0.9
                            securityContext:
                              capabilities:
                                add: ["SYS_ADMIN"]
                            env:
                              - { name: SAMBA_CONTAINER_ID, value: "dc1" }
                              - { name: SAMBACC_CONFIG, value: "/etc/sambacc/addc.json" }
                            ports:
                              - { containerPort: 53, protocol: TCP }
                              - { containerPort: 53, protocol: UDP }
                              - { containerPort: 88, protocol: TCP }
                              - { containerPort: 88, protocol: UDP }
                              - { containerPort: 389, protocol: TCP }
                              - { containerPort: 389, protocol: UDP }   # CLDAP — DC locator (samba-tool gpo, Windows DC location)
                              - { containerPort: 135, protocol: TCP }    # RPC endpoint mapper (Windows domain join / mgmt)
                              - { containerPort: 445, protocol: TCP }
                              - { containerPort: 464, protocol: TCP }
                              - { containerPort: 464, protocol: UDP }
                              - { containerPort: 636, protocol: TCP }   # LDAPS (encrypted LDAP — required for password writes)
                              - { containerPort: 3268, protocol: TCP }  # Global Catalog
                              - { containerPort: 3269, protocol: TCP }  # Global Catalog over SSL
                              {{- /* pinned dynamic RPC range (matches smb.conf "rpc server dynamic port
                                     range"): the epmapper hands a client one of these to finish the join. */}}
                              {{- range $i := until 13 }}
                              - { containerPort: {{ add 49152 $i }}, protocol: TCP }
                              {{- end }}
                            readinessProbe:
                              tcpSocket: { port: 389 }
                              initialDelaySeconds: 30
                              periodSeconds: 10
                              failureThreshold: 30
                            volumeMounts:
                              - { name: data, mountPath: /var/lib/samba }
                              # sambacc guards re-provision on the existence of /etc/samba/smb.conf
                              # (addc.py _provisioned marker). /etc/samba is on the container's
                              # ephemeral overlay, so every pod roll lost the marker and sambacc
                              # RE-PROVISIONED a fresh domain over the persisted DB. Persist it on
                              # the PVC (subPath) so a rolled pod sees "already provisioned" and
                              # just serves — non-destructive restarts.
                              - { name: data, mountPath: /etc/samba, subPath: etc-samba }
                              - { name: config, mountPath: /etc/sambacc }
                          {{- if $vip }}
                          # dns-vip: the DC auto-registers its ephemeral POD IP in AD DNS
                          # (dc1 / apex A -> 10.42.x), which no LAN client can reach and which
                          # changes every roll. Rewrite dc1 + the domain apex A records to the
                          # LoadBalancer VIP so clients resolve to a reachable, stable address.
                          # Idempotent; re-checks every 5m in case Samba re-registers the pod IP.
                          # Talks to the DC over localhost (same pod netns). Only rendered once
                          # the VIP exists, so it never fights a not-yet-assigned address.
                          - name: dns-vip
                            image: quay.io/samba.org/samba-ad-server:v0.9
                            command: ["/bin/sh", "-c"]
                            args:
                              - |
                                AUTH="Administrator%$ADMIN_PASSWORD"
                                # The DC registers SRV records that target BOTH its friendly name
                                # (dc1) AND its pod-hostname node (<name>-dc-0), and it appends its
                                # pod IP to the latter on every roll (accumulating stale, unreachable
                                # A records that clients round-robin onto). Reconcile every host node
                                # a client can be sent to -> the VIP.
                                echo "dns-vip: reconciling $NODES A -> $VIP"
                                while true; do
                                  if samba-tool dns query 127.0.0.1 "$DOMAIN" @ A -U "$AUTH" >/dev/null 2>&1; then
                                    for NAME in $NODES; do
                                      IPS=$(samba-tool dns query 127.0.0.1 "$DOMAIN" "$NAME" A -U "$AUTH" 2>/dev/null | grep -oE '([0-9]{1,3}\.){3}[0-9]{1,3}' || true)
                                      echo "$IPS" | grep -qx "$VIP" || samba-tool dns add 127.0.0.1 "$DOMAIN" "$NAME" A "$VIP" -U "$AUTH" >/dev/null 2>&1 || true
                                      for ip in $IPS; do
                                        [ "$ip" = "$VIP" ] || samba-tool dns delete 127.0.0.1 "$DOMAIN" "$NAME" A "$ip" -U "$AUTH" >/dev/null 2>&1 || true
                                      done
                                    done
                                  fi
                                  sleep 60
                                done
                            env:
                              - { name: VIP, value: "{{ $vip }}" }
                              - { name: DOMAIN, value: "{{ $domain }}" }
                              # host records a client may resolve the DC as: the friendly name and
                              # the StatefulSet pod-hostname node (both are SRV targets).
                              - { name: NODES, value: "dc1 {{ $name }}-dc-0" }
                              - name: ADMIN_PASSWORD
                                valueFrom:
                                  secretKeyRef: { name: {{ $name }}-directory, key: ADMIN_PASSWORD }
                          {{- end }}
                        volumes:
                          - name: config
                            secret: { secretName: {{ $name }}-dc-secret }
                    volumeClaimTemplates:
                      - metadata: { name: data }
                        spec:
                          accessModes: [ReadWriteOnce]
                          storageClassName: longhorn
                          resources:
                            requests:
                              storage: {{ $size }}
            ---
            # Service: the AD ports. LoadBalancer (LAN IP) when expose, else
            # ClusterIP. Either way it has a stable ClusterIP that in-cluster VMs
            # use as their DNS server to resolve the domain and join.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels: { openinfra.dev/directory: "true" }
                  spec:
                    type: {{ if $expose }}LoadBalancer{{ else }}ClusterIP{{ end }}
                    selector: { app: {{ $name }}-dc }
                    ports:
                      - { name: dns-tcp, port: 53, targetPort: 53, protocol: TCP }
                      - { name: dns-udp, port: 53, targetPort: 53, protocol: UDP }
                      - { name: kerberos-tcp, port: 88, targetPort: 88, protocol: TCP }
                      - { name: kerberos-udp, port: 88, targetPort: 88, protocol: UDP }
                      - { name: ldap, port: 389, targetPort: 389, protocol: TCP }
                      - { name: cldap, port: 389, targetPort: 389, protocol: UDP }
                      - { name: smb, port: 445, targetPort: 445, protocol: TCP }
                      - { name: epmapper, port: 135, targetPort: 135, protocol: TCP }
                      - { name: kpasswd-tcp, port: 464, targetPort: 464, protocol: TCP }
                      - { name: kpasswd-udp, port: 464, targetPort: 464, protocol: UDP }
                      - { name: ldaps, port: 636, targetPort: 636, protocol: TCP }
                      - { name: gc, port: 3268, targetPort: 3268, protocol: TCP }
                      - { name: gc-ssl, port: 3269, targetPort: 3269, protocol: TCP }
                      {{- /* pinned dynamic RPC range for the machine-account RPC (135 -> one of these) */}}
                      {{- range $i := until 13 }}
                      - { name: rpc-{{ add 49152 $i }}, port: {{ add 49152 $i }}, targetPort: {{ add 49152 $i }}, protocol: TCP }
                      {{- end }}
            ---
            # Connection secret: the domain + admin credentials, for the console and
            # for the VM composition's auto-join. The live DC IP is read from the
            # Service by the console (not stored here).
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: conn-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata:
                    name: {{ $name }}-directory
                    namespace: {{ $ns }}
                  stringData:
                    DOMAIN: {{ $domain }}
                    REALM: {{ $realm }}
                    NETBIOS: {{ $netbios }}
                    ADMIN_USER: {{ $admin }}
                    ADMIN_PASSWORD: {{ $pass }}
                    DC_SERVICE: {{ $name }}.{{ $ns }}.svc.cluster.local
                    DC_IP: {{ $dcip | quote }}
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
