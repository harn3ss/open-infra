# The compiler for kind: Function -> a Knative Service (scale-to-zero HTTP), plus
# the same on-demand managed services as kind: Application (DB / bucket / queue /
# secret injection). Knative handles the Service, ingress route, and request-driven
# autoscaling (0..N..0); we just declare the container + scaling + optional GPU.
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: function
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XFunction
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $scaling := $spec.scaling | default dict }}
            {{- $gpu := $spec.gpu | default 0 }}
            {{- /* expose defaults true; hasKey check (Sprig default treats false
                   as empty). false -> cluster-local (in-cluster only). */}}
            {{- $expose := true }}{{- if hasKey $spec "expose" }}{{- $expose = $spec.expose }}{{- end }}
            ---
            # --- Knative Service: the scale-to-zero "Function" ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: function
            spec:
              forProvider:
                manifest:
                  apiVersion: serving.knative.dev/v1
                  kind: Service
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      app.kubernetes.io/name: {{ $name }}
                      {{- if not $expose }}
                      # Private: only reachable from inside the cluster.
                      networking.knative.dev/visibility: cluster-local
                      {{- end }}
                  spec:
                    template:
                      metadata:
                        annotations:
                          # KPA scaling: min 0 = scale to zero when idle.
                          autoscaling.knative.dev/min-scale: "{{ $scaling.min | default 0 }}"
                          autoscaling.knative.dev/max-scale: "{{ $scaling.max | default 10 }}"
                          autoscaling.knative.dev/target: "{{ $scaling.target | default 100 }}"
                      spec:
                        {{- if gt (int $gpu) 0 }}
                        runtimeClassName: nvidia
                        nodeSelector: { openinfra.dev/gpu: "true" }
                        {{- end }}
                        containers:
                          - image: {{ $spec.image }}
                            ports: [ { containerPort: {{ $spec.port | default 8080 }} } ]
                            {{- if or $spec.env $spec.queues }}
                            env:
                            {{- range $spec.env }}
                              - { name: {{ .name }}, value: "{{ .value }}" }
                            {{- end }}
                            {{- if $spec.queues }}
                              - { name: NATS_URL, value: "nats://nats.nats.svc.cluster.local:4222" }
                              - { name: OPENINFRA_QUEUES, value: "{{ join "," $spec.queues }}" }
                            {{- end }}
                            {{- end }}
                            {{- if $spec.secrets }}
                            envFrom:
                            {{- range $spec.secrets }}
                              - secretRef: { name: {{ . }}, optional: true }
                            {{- end }}
                            {{- end }}
                            {{- if gt (int $gpu) 0 }}
                            resources:
                              limits: { nvidia.com/gpu: {{ $gpu }} }
                            {{- end }}
            {{- if $spec.trigger }}
            {{- $tstream := $spec.trigger.stream }}
            {{- $tsubject := $spec.trigger.subject | default (printf "cdc.%s.>" $tstream) }}
            ---
            # Event-source mapping: a Benthos "pump" holds a durable JetStream
            # consumer and POSTs each CDC event to this function (which cold-starts
            # on demand, then scales back to zero). open-infra's Lambda-on-Kinesis.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: pump-config
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: {{ $name }}-pump-cfg
                    namespace: {{ $ns }}
                  data:
                    benthos.yaml: |
                      logger: { level: INFO, format: logfmt }
                      input:
                        nats_jetstream:
                          urls: ["nats://nats.nats.svc.cluster.local:4222"]
                          subject: "{{ $tsubject }}"
                          durable: "fn-{{ $name }}"
                          deliver: all
                          ack_wait: 2m
                      output:
                        http_client:
                          url: "http://{{ $name }}.{{ $ns }}.svc.cluster.local"
                          verb: POST
                          timeout: 90s
                          headers: { Content-Type: application/json }
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: pump
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}-pump
                    namespace: {{ $ns }}
                    labels: { app: {{ $name }}-pump, openinfra.dev/function-pump: "{{ $name }}" }
                  spec:
                    replicas: 1
                    selector: { matchLabels: { app: {{ $name }}-pump } }
                    template:
                      metadata: { labels: { app: {{ $name }}-pump } }
                      spec:
                        containers:
                          - name: pump
                            image: jeffail/benthos:4.27.0
                            args: ["-c", "/etc/benthos/benthos.yaml"]
                            volumeMounts: [{ name: cfg, mountPath: /etc/benthos }]
                        volumes:
                          - name: cfg
                            configMap: { name: {{ $name }}-pump-cfg }
            {{- end }}
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
