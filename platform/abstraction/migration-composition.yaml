# The compiler for kind: Migration -> open-infra's own Debezium-based DMS engine.
# AWS-DMS-style replication (full-load and/or CDC) from a source database into a
# target SQL database, source and target engines free to differ. Replaces the
# previous Airbyte/provider-terraform engine.
#
# Per Migration the composition renders:
#   - a PVC (Debezium offsets + schema history, so restarts resume not re-snapshot),
#   - a ConfigMap (Debezium Server application.properties; the source password is an
#     env var from the user's Secret, never inlined — Quarkus maps it onto
#     debezium.source.database.password). The records are unwrapped
#     (ExtractNewRecordState) and decimals emitted as strings for the apply-sink.
#   - a Deployment (Debezium Server; an initContainer creates the JetStream stream),
#   - a Job (apply-sink in schema-sync mode: introspect source -> auto-create target
#     tables with cross-engine type mapping),
#   - a Deployment (apply-sink in stream mode: consume the change events and apply
#     idempotent upserts/deletes to the target).
# DB passwords are injected as env from the user's Secrets and expanded into the
# DSNs at runtime (${SOURCE_PASSWORD} / ${TARGET_PASSWORD}); never inlined.
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: migration
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XMigration
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource }}
            {{- $spec := $xr.spec }}
            {{- $labels := $xr.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default $xr.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $src := $spec.source }}
            {{- $tgt := $spec.target }}
            {{- $mode := $spec.mode | default "full-load-and-cdc" }}
            {{- $sengine := $src.engine }}
            {{- $tengine := $tgt.engine | default "postgres" }}
            {{- $shost := $src.host }}{{- $sport := $src.port | default 5432 }}{{- $sdb := $src.database }}{{- $suser := $src.username }}{{- $sssl := $src.ssl | default false }}
            {{- $thost := $tgt.host }}{{- $tport := $tgt.port | default 5432 }}{{- $tdb := $tgt.database }}{{- $tuser := $tgt.username }}{{- $tssl := $tgt.ssl | default false }}
            {{- $schemas := $src.schemas | default (list "public") }}
            {{- $tables := $spec.tables | default (list) }}
            {{- $sPwSecret := $src.passwordSecretRef.name }}{{- $sPwKey := (($src.passwordSecretRef).key) | default "password" }}
            {{- $tPwSecret := $tgt.passwordSecretRef.name }}{{- $tPwKey := (($tgt.passwordSecretRef).key) | default "password" }}
            {{- $slot := printf "migdbz_%s" (regexReplaceAll "[^a-zA-Z0-9_]" $name "_") }}
            {{- $streamName := printf "mig-%s" $name }}
            {{- $subjects := printf "mig.%s.>" $name }}
            {{- $snap := "initial" }}
            {{- if eq $mode "full-load" }}{{ $snap = "initial_only" }}{{- end }}
            {{- if eq $mode "cdc" }}{{ $snap = "no_data" }}{{- end }}
            {{- /* source table include list: qualify each bare table name. */}}
            {{- $qualifier := $sdb }}
            {{- if or (eq $sengine "postgres") (eq $sengine "sqlserver") }}{{ $qualifier = ($schemas | first) }}{{- end }}
            {{- $include := "" }}
            {{- if $tables }}{{- $q := list }}{{- range $t := $tables }}{{ $q = append $q (printf "%s.%s" $qualifier $t) }}{{- end }}{{- $include = join "," $q }}{{- end }}
            {{- /* runtime DSNs; password is ${...} expanded by the apply-sink from env */}}
            {{- $srcDSN := "" }}{{- $tgtDSN := "" }}
            {{- if or (eq $sengine "mysql") (eq $sengine "mariadb") }}
            {{-   $srcDSN = printf "%s:${SOURCE_PASSWORD}@tcp(%s:%v)/%s?parseTime=true" $suser $shost $sport $sdb }}
            {{- else if eq $sengine "sqlserver" }}
            {{-   $srcDSN = printf "sqlserver://%s:${SOURCE_PASSWORD}@%s:%v?database=%s&encrypt=%s" $suser $shost $sport $sdb (ternary "true" "disable" $sssl) }}
            {{- else }}
            {{-   $srcDSN = printf "postgres://%s:${SOURCE_PASSWORD}@%s:%v/%s?sslmode=%s" $suser $shost $sport $sdb (ternary "require" "disable" $sssl) }}
            {{- end }}
            {{- if eq $tengine "mysql" }}
            {{-   $tgtDSN = printf "%s:${TARGET_PASSWORD}@tcp(%s:%v)/%s?parseTime=true" $tuser $thost $tport $tdb }}
            {{- else if eq $tengine "sqlserver" }}
            {{-   $tgtDSN = printf "sqlserver://%s:${TARGET_PASSWORD}@%s:%v?database=%s&encrypt=%s" $tuser $thost $tport $tdb (ternary "true" "disable" $tssl) }}
            {{- else }}
            {{-   $tgtDSN = printf "postgres://%s:${TARGET_PASSWORD}@%s:%v/%s?sslmode=%s" $tuser $thost $tport $tdb (ternary "require" "disable" $tssl) }}
            {{- end }}
            ---
            # Debezium offsets + (relational) schema history.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: offsets-pvc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: PersistentVolumeClaim
                  metadata:
                    name: {{ $name }}-migration-offsets
                    namespace: {{ $ns }}
                  spec:
                    accessModes: [ReadWriteOnce]
                    storageClassName: longhorn
                    resources:
                      requests:
                        storage: 1Gi
            ---
            # Debezium Server config. Records are unwrapped to the after-image and
            # decimals emitted as strings so the apply-sink can bind them directly.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dbz-config
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: {{ $name }}-migration-config
                    namespace: {{ $ns }}
                  data:
                    application.properties: |
                      debezium.sink.type=nats-jetstream
                      debezium.sink.nats-jetstream.url=nats://nats.nats.svc.cluster.local:4222
                      debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
                      debezium.source.offset.flush.interval.ms=0
                      debezium.source.topic.prefix=mig.{{ $name }}
                      debezium.source.snapshot.mode={{ $snap }}
                      debezium.source.decimal.handling.mode=string
                      debezium.source.include.schema.changes=false
                      debezium.format.key=json
                      debezium.format.value=json
                      debezium.format.key.schemas.enable=false
                      debezium.format.value.schemas.enable=false
                      debezium.transforms=unwrap
                      debezium.transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
                      debezium.transforms.unwrap.drop.tombstones=false
                      debezium.transforms.unwrap.delete.handling.mode=rewrite
                      quarkus.log.console.json=false
                  {{- if eq $sengine "postgres" }}
                      debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
                      debezium.source.plugin.name=pgoutput
                      debezium.source.slot.name={{ $slot }}
                      debezium.source.publication.name={{ $slot }}_pub
                      debezium.source.database.hostname={{ $shost }}
                      debezium.source.database.port={{ $sport }}
                      debezium.source.database.user={{ $suser }}
                      debezium.source.database.dbname={{ $sdb }}
                    {{- if $sssl }}
                      debezium.source.database.sslmode=require
                    {{- end }}
                    {{- if $include }}
                      debezium.source.table.include.list={{ $include }}
                    {{- end }}
                  {{- else if or (eq $sengine "mysql") (eq $sengine "mariadb") }}
                      debezium.source.connector.class=io.debezium.connector.mysql.MySqlConnector
                      debezium.source.database.hostname={{ $shost }}
                      debezium.source.database.port={{ $sport }}
                      debezium.source.database.user={{ $suser }}
                      debezium.source.database.server.id={{ $name | adler32sum }}
                      debezium.source.database.include.list={{ $sdb }}
                      debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
                      debezium.source.schema.history.internal.file.filename=/debezium/data/schema_history.dat
                    {{- if $sssl }}
                      debezium.source.database.ssl.mode=required
                    {{- end }}
                    {{- if $include }}
                      debezium.source.table.include.list={{ $include }}
                    {{- end }}
                  {{- else if eq $sengine "sqlserver" }}
                      debezium.source.connector.class=io.debezium.connector.sqlserver.SqlServerConnector
                      debezium.source.database.hostname={{ $shost }}
                      debezium.source.database.port={{ $sport }}
                      debezium.source.database.user={{ $suser }}
                      debezium.source.database.names={{ $sdb }}
                      debezium.source.database.encrypt={{ $sssl }}
                    {{- if $sssl }}
                      debezium.source.database.trustServerCertificate=true
                    {{- end }}
                      debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
                      debezium.source.schema.history.internal.file.filename=/debezium/data/schema_history.dat
                    {{- if $include }}
                      debezium.source.table.include.list={{ $include }}
                    {{- end }}
                  {{- end }}
            ---
            # Debezium Server. initContainer creates the JetStream stream first.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: dbz
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}-migration-dbz
                    namespace: {{ $ns }}
                    labels: { app: {{ $name }}-migration, openinfra.dev/migration: "{{ $name }}" }
                  spec:
                    replicas: 1
                    strategy: { type: Recreate }
                    selector: { matchLabels: { app: {{ $name }}-migration-dbz } }
                    template:
                      metadata: { labels: { app: {{ $name }}-migration-dbz } }
                      spec:
                        securityContext: { fsGroup: 185 }
                        initContainers:
                          - name: ensure-stream
                            image: natsio/nats-box:latest
                            command:
                              - sh
                              - -c
                              - nats stream info {{ $streamName }} >/dev/null 2>&1 || nats stream add {{ $streamName }} --subjects='mig.{{ $name }}.>' --subjects='mig.{{ $name }}' --storage=file --replicas=1 --max-bytes=2GB --discard=old --defaults
                            env:
                              - { name: NATS_URL, value: "nats://nats.nats.svc.cluster.local:4222" }
                        containers:
                          - name: debezium
                            image: quay.io/debezium/server:2.7.3.Final
                            env:
                              - name: DEBEZIUM_SOURCE_DATABASE_PASSWORD
                                valueFrom:
                                  secretKeyRef:
                                    name: {{ $sPwSecret }}
                                    key: {{ $sPwKey }}
                            volumeMounts:
                              - { name: config, mountPath: /debezium/conf/application.properties, subPath: application.properties }
                              - { name: data, mountPath: /debezium/data }
                        volumes:
                          - name: config
                            configMap: { name: {{ $name }}-migration-config }
                          - name: data
                            persistentVolumeClaim: { claimName: {{ $name }}-migration-offsets }
            ---
            # schema-sync: introspect the source and auto-create the target tables
            # (cross-engine type mapping). Runs to completion before/while streaming.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: schema-sync
            spec:
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: {{ $name }}-migration-schemasync
                    namespace: {{ $ns }}
                  spec:
                    backoffLimit: 30
                    template:
                      metadata: { labels: { app: {{ $name }}-migration-schemasync } }
                      spec:
                        restartPolicy: OnFailure
                        containers:
                          - name: schema-sync
                            image: ghcr.io/harn3ss/open-infra-apply-sink:latest
                            env:
                              - { name: MODE, value: schema-sync }
                              - { name: SOURCE_ENGINE, value: "{{ $sengine }}" }
                              - { name: SOURCE_DSN, value: "{{ $srcDSN }}" }
                              - name: SOURCE_PASSWORD
                                valueFrom: { secretKeyRef: { name: {{ $sPwSecret }}, key: {{ $sPwKey }} } }
                              - { name: TARGET_ENGINE, value: "{{ $tengine }}" }
                              - { name: TARGET_DSN, value: "{{ $tgtDSN }}" }
                              - name: TARGET_PASSWORD
                                valueFrom: { secretKeyRef: { name: {{ $tPwSecret }}, key: {{ $tPwKey }} } }
                          {{- if $include }}
                              - { name: TABLES, value: "{{ $include }}" }
                          {{- end }}
                          {{- if $tgt.schema }}
                              - { name: TARGET_SCHEMA, value: "{{ $tgt.schema }}" }
                          {{- end }}
            ---
            # apply-sink: consume the change events and apply them to the target.
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: apply-sink
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}-migration-applysink
                    namespace: {{ $ns }}
                    labels: { app: {{ $name }}-migration-applysink, openinfra.dev/migration: "{{ $name }}" }
                  spec:
                    replicas: 1
                    selector: { matchLabels: { app: {{ $name }}-migration-applysink } }
                    template:
                      metadata: { labels: { app: {{ $name }}-migration-applysink } }
                      spec:
                        containers:
                          - name: apply-sink
                            image: ghcr.io/harn3ss/open-infra-apply-sink:latest
                            env:
                              - { name: MODE, value: stream }
                              - { name: TARGET_ENGINE, value: "{{ $tengine }}" }
                              - { name: TARGET_DSN, value: "{{ $tgtDSN }}" }
                              - name: TARGET_PASSWORD
                                valueFrom: { secretKeyRef: { name: {{ $tPwSecret }}, key: {{ $tPwKey }} } }
                              - { name: NATS_URL, value: "nats://nats.nats.svc.cluster.local:4222" }
                              - { name: STREAM, value: "{{ $streamName }}" }
                              - { name: SUBJECT, value: "{{ $subjects }}" }
                              - { name: DURABLE, value: "{{ $streamName }}" }
                          {{- if $tgt.schema }}
                              - { name: TARGET_SCHEMA, value: "{{ $tgt.schema }}" }
                          {{- end }}
                            resources:
                              requests: { cpu: 50m, memory: 32Mi }
                              limits: { cpu: "1", memory: 256Mi }
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
