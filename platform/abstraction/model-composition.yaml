# The compiler for kind: Model -> a GPU-backed Ollama server + an nginx auth
# sidecar that gates the OpenAI-compatible endpoint behind a generated API key,
# + a PVC for cached weights, + a Service, + (optional) Ingress, + a connection
# Secret (<name>-model: OPENAI_BASE_URL / OPENAI_API_KEY / MODEL) that apps
# reference the same way they reference the database secret.
#
# The API key is derived deterministically from the composite's UID, so it is
# stable across reconciles (re-rendering must not churn the key).
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: model
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XModel
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $gpu := $spec.gpu | default 1 }}
            {{- $size := $spec.storageSize | default "20Gi" }}
            {{- $key := .observed.composite.resource.metadata.uid | sha256sum | trunc 32 }}
            {{- $svc := printf "%s.%s.svc.cluster.local" $name $ns }}
            ---
            # --- PVC: cache Ollama model weights so they survive restarts ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: models-pvc
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: PersistentVolumeClaim
                  metadata: { name: {{ $name }}-models, namespace: {{ $ns }} }
                  spec:
                    accessModes: [ReadWriteOnce]
                    storageClassName: local-path   # local NVMe; never CIFS/NFS
                    resources: { requests: { storage: {{ $size }} } }
            ---
            # --- Auth-proxy config (Secret so the key isn't in a plaintext CM).
            #     nginx $variables below are literal (not Go-template actions). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: proxy-conf
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-proxy-conf, namespace: {{ $ns }} }
                  stringData:
                    default.conf: |
                      server {
                        listen 8080;
                        location / {
                          if ($http_authorization != "Bearer {{ $key }}") { return 401; }
                          proxy_pass http://127.0.0.1:11434;
                          proxy_http_version 1.1;
                          proxy_set_header Host $host;
                          proxy_buffering off;
                          proxy_read_timeout 600s;
                        }
                      }
            ---
            # --- Deployment: Ollama (GPU) + nginx auth sidecar. Recreate strategy
            #     because the GPU + RWO PVC can't be shared during a rollover. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/name: {{ $name }} }
                  spec:
                    selector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
                    strategy: { type: Recreate }
                    template:
                      metadata: { labels: { app.kubernetes.io/name: {{ $name }} } }
                      spec:
                        runtimeClassName: nvidia
                        nodeSelector: { openinfra.dev/gpu: "true" }
                        containers:
                          - name: ollama
                            image: ollama/ollama:0.30.10
                            # Start the server, wait for it, pull the model once
                            # (cached on the PVC), then hand the process back.
                            command: ["/bin/sh", "-c"]
                            args:
                              - 'ollama serve & pid=$!; until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull {{ $spec.model }} || true; wait $pid'
                            ports: [ { containerPort: 11434 } ]
                            resources:
                              requests: { cpu: 250m, memory: 1Gi }
                              limits: { cpu: "4", memory: 8Gi, nvidia.com/gpu: {{ $gpu }} }
                            volumeMounts:
                              - { name: models, mountPath: /root/.ollama }
                            readinessProbe: { tcpSocket: { port: 11434 }, initialDelaySeconds: 5, periodSeconds: 10 }
                            livenessProbe:  { tcpSocket: { port: 11434 }, initialDelaySeconds: 30, periodSeconds: 20 }
                          - name: auth
                            image: nginx:1.27-alpine
                            ports: [ { containerPort: 8080 } ]
                            resources:
                              requests: { cpu: 25m, memory: 32Mi }
                              limits: { cpu: 200m, memory: 128Mi }
                            volumeMounts:
                              - { name: proxy-conf, mountPath: /etc/nginx/conf.d }
                            readinessProbe: { tcpSocket: { port: 8080 } }
                        volumes:
                          - name: models
                            persistentVolumeClaim: { claimName: {{ $name }}-models }
                          - name: proxy-conf
                            secret: { secretName: {{ $name }}-proxy-conf }
            ---
            # --- Service: the key-gated endpoint (port 80 -> nginx 8080) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    selector: { app.kubernetes.io/name: {{ $name }} }
                    ports: [ { port: 80, targetPort: 8080 } ]
            ---
            # --- Connection Secret consumers reference (cf. the DB secret) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: model-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-model, namespace: {{ $ns }} }
                  stringData:
                    MODEL: "{{ $spec.model }}"
                    OPENAI_BASE_URL: "http://{{ $svc }}/v1"
                    OPENAI_API_KEY: "{{ $key }}"
                    ENDPOINT: "http://{{ $svc }}"
            {{- if $spec.domain }}
            ---
            # --- Ingress (external) + TLS via cert-manager ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    annotations:
                      cert-manager.io/cluster-issuer: openinfra-issuer
                  spec:
                    rules:
                      - host: {{ $spec.domain }}
                        http:
                          paths:
                            - path: /
                              pathType: Prefix
                              backend: { service: { name: {{ $name }}, port: { number: 80 } } }
                    tls:
                      - hosts: [ {{ $spec.domain }} ]
                        secretName: {{ $name }}-tls
            {{- end }}
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
