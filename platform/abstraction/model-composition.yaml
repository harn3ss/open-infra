# The compiler for kind: Model -> an Ollama server + an nginx auth sidecar that
# gates the OpenAI-compatible endpoint behind a generated API key, + a Service,
# + (optional) Ingress, + a connection Secret (<name>-model: OPENAI_BASE_URL /
# OPENAI_API_KEY / MODEL) that apps reference like the database secret.
#
# Resources/placement are driven by a curated catalog ($catalog below, in sync
# with the XRD enum): each model maps to a tier (cpu / smallgpu / largegpu) that
# sets CPU/RAM and GPU targeting. highAvailability runs 2 replicas across nodes.
#
# The API key is derived deterministically from the composite's UID, so it is
# stable across reconciles (re-rendering must not churn the key).
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: model
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XModel
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $size := $spec.storageSize | default "20Gi" }}
            {{- $key := .observed.composite.resource.metadata.uid | sha256sum | trunc 32 }}
            {{- $svc := printf "%s.%s.svc.cluster.local" $name $ns }}
            {{- /* Curated catalog: model tag -> resource profile. KEEP IN SYNC with
                   the XRD enum. tier drives GPU placement: cpu (no GPU, runs
                   anywhere), smallgpu (A2000 class, may use a large GPU), largegpu
                   (requires a large GPU). */}}
            {{- $catalog := dict
                  "qwen2.5:0.5b" (dict "tier" "cpu"      "cpu" "2" "memory" "4Gi")
                  "llama3.2:1b"  (dict "tier" "cpu"      "cpu" "2" "memory" "4Gi")
                  "llama3.2:3b"  (dict "tier" "smallgpu" "cpu" "4" "memory" "8Gi")
                  "llama3.1:8b"  (dict "tier" "smallgpu" "cpu" "4" "memory" "12Gi")
                  "mixtral:8x7b" (dict "tier" "largegpu" "cpu" "8" "memory" "16Gi") }}
            {{- $profile := (index $catalog $spec.model) | default (dict "tier" "cpu" "cpu" "2" "memory" "4Gi") }}
            {{- $tier := $profile.tier }}
            {{- $useGpu := ne $tier "cpu" }}
            {{- $replicas := 1 }}{{- if $spec.highAvailability }}{{- $replicas = 2 }}{{- end }}
            ---
            # --- Auth-proxy config (Secret so the key isn't in a plaintext CM).
            #     nginx $variables below are literal (not Go-template actions). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: proxy-conf
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-proxy-conf, namespace: {{ $ns }} }
                  stringData:
                    default.conf: |
                      server {
                        listen 8080;
                        location / {
                          if ($http_authorization != "Bearer {{ $key }}") { return 401; }
                          proxy_pass http://127.0.0.1:11434;
                          proxy_http_version 1.1;
                          proxy_set_header Host $host;
                          proxy_buffering off;
                          proxy_read_timeout 600s;
                        }
                      }
            ---
            # --- Deployment: Ollama + nginx auth sidecar. Resources, GPU class, and
            #     replica count all come from the catalog profile + highAvailability.
            #     Recreate strategy: a GPU can't host two replicas during a rollover. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: deployment
            spec:
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels: { app.kubernetes.io/name: {{ $name }} }
                  spec:
                    replicas: {{ $replicas }}
                    selector: { matchLabels: { app.kubernetes.io/name: {{ $name }} } }
                    strategy: { type: Recreate }
                    template:
                      metadata: { labels: { app.kubernetes.io/name: {{ $name }} } }
                      spec:
                        {{- if $useGpu }}
                        runtimeClassName: nvidia
                        {{- end }}
                        {{- if or $useGpu $spec.highAvailability }}
                        affinity:
                          {{- if $useGpu }}
                          # Target the right GPU class. largegpu requires a large GPU;
                          # smallgpu prefers a small GPU but may use a large one (so it
                          # doesn't strand on a single node), keeping big GPUs free.
                          nodeAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              nodeSelectorTerms:
                                - matchExpressions:
                                    - key: openinfra.dev/gpu-tier
                                      operator: In
                                      {{- if eq $tier "largegpu" }}
                                      values: [large]
                                      {{- else }}
                                      values: [small, large]
                                      {{- end }}
                            {{- if eq $tier "smallgpu" }}
                            preferredDuringSchedulingIgnoredDuringExecution:
                              - weight: 100
                                preference:
                                  matchExpressions:
                                    - { key: openinfra.dev/gpu-tier, operator: In, values: [small] }
                            {{- end }}
                          {{- end }}
                          {{- if $spec.highAvailability }}
                          # Spread replicas across nodes. If too few qualifying nodes
                          # exist, the extra replica stays Pending (graceful degrade).
                          podAntiAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              - labelSelector:
                                  matchLabels: { app.kubernetes.io/name: {{ $name }} }
                                topologyKey: kubernetes.io/hostname
                          {{- end }}
                        {{- end }}
                        containers:
                          - name: ollama
                            image: ollama/ollama:0.30.10
                            # Start the server, wait for it, pull the model once, then
                            # hand the process back. Weights re-pull on each fresh pod.
                            command: ["/bin/sh", "-c"]
                            args:
                              - 'ollama serve & pid=$!; until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull {{ $spec.model }} || true; wait $pid'
                            ports: [ { containerPort: 11434 } ]
                            resources:
                              requests: { cpu: 250m, memory: 1Gi }
                              limits:
                                cpu: "{{ $profile.cpu }}"
                                memory: {{ $profile.memory }}
                                {{- if $useGpu }}
                                nvidia.com/gpu: 1
                                {{- end }}
                            volumeMounts:
                              - { name: models, mountPath: /root/.ollama }
                            readinessProbe: { tcpSocket: { port: 11434 }, initialDelaySeconds: 5, periodSeconds: 10 }
                            livenessProbe:  { tcpSocket: { port: 11434 }, initialDelaySeconds: 30, periodSeconds: 20 }
                          - name: auth
                            image: nginx:1.27-alpine
                            ports: [ { containerPort: 8080 } ]
                            resources:
                              requests: { cpu: 25m, memory: 32Mi }
                              limits: { cpu: 200m, memory: 128Mi }
                            volumeMounts:
                              - { name: proxy-conf, mountPath: /etc/nginx/conf.d }
                            readinessProbe: { tcpSocket: { port: 8080 } }
                        volumes:
                          # Ephemeral weight cache. Stateless by design: a node-local
                          # PVC would pin the Model to one node (local-path PVs carry a
                          # hostname nodeAffinity), so it could never reschedule when
                          # that node fails. The startup `ollama pull` re-fetches weights
                          # on any GPU node; sizeLimit bounds the scratch space.
                          - name: models
                            emptyDir: { sizeLimit: {{ $size }} }
                          - name: proxy-conf
                            secret: { secretName: {{ $name }}-proxy-conf }
            ---
            # --- Service: the key-gated endpoint (port 80 -> nginx 8080) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    selector: { app.kubernetes.io/name: {{ $name }} }
                    ports: [ { port: 80, targetPort: 8080 } ]
            {{- if $spec.expose }}
            ---
            # --- LAN LoadBalancer (MetalLB): the inference endpoint on a LAN IP,
            #     so workstations hit the OpenAI API without DNS/Ingress. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: model-lan
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $name }}-lan
                    namespace: {{ $ns }}
                    labels: { openinfra.dev/model-lan: {{ $name }} }
                  spec:
                    type: LoadBalancer
                    selector: { app.kubernetes.io/name: {{ $name }} }
                    ports: [ { port: 80, targetPort: 8080 } ]
            {{- end }}
            ---
            # --- Connection Secret consumers reference (cf. the DB secret) ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: model-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-model, namespace: {{ $ns }} }
                  stringData:
                    MODEL: "{{ $spec.model }}"
                    OPENAI_BASE_URL: "http://{{ $svc }}/v1"
                    OPENAI_API_KEY: "{{ $key }}"
                    ENDPOINT: "http://{{ $svc }}"
            {{- if $spec.domain }}
            ---
            # --- Ingress (external) + TLS via cert-manager ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: ingress
            spec:
              forProvider:
                manifest:
                  apiVersion: networking.k8s.io/v1
                  kind: Ingress
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    annotations:
                      cert-manager.io/cluster-issuer: openinfra-issuer
                  spec:
                    rules:
                      - host: {{ $spec.domain }}
                        http:
                          paths:
                            - path: /
                              pathType: Prefix
                              backend: { service: { name: {{ $name }}, port: { number: 80 } } }
                    tls:
                      - hosts: [ {{ $spec.domain }} ]
                        secretName: {{ $name }}-tls
            {{- end }}
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
