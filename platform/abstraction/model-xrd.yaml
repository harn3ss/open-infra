# open-infra's "Bedrock": a second public API, kind: Model. Give it a model name
# and get a GPU-backed, OpenAI-compatible inference endpoint gated by a generated
# API key — provisioned the same way `kind: Application` provisions apps.
# KEEP THIS SCHEMA STABLE — it is part of the product's contract.
#
# Synced after Crossplane's CRDs exist (sync-wave 2).
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xmodels.openinfra.dev
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  group: openinfra.dev
  names:
    kind: XModel
    plural: xmodels
  claimNames:
    kind: Model            # what users write in infra.yaml
    plural: models
  defaultCompositionRef:
    name: model
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [model]
              properties:
                # Curated catalog (allowlist). Each entry maps to a tier + resource
                # profile in the Composition (CPU/RAM, GPU class, or CPU-only). This
                # is the governance + right-sizing contract — adding a model means
                # adding it here AND to the Composition's $catalog.
                model:
                  type: string
                  description: "Model to serve (from the curated catalog)."
                  enum:
                    - qwen2.5:0.5b     # nano  · CPU-only · ultra-fast, tiny
                    - llama3.2:1b      # nano  · CPU-only
                    - llama3.2:3b      # small · GPU (A2000 class)
                    - llama3.1:8b      # standard · GPU (A2000 class)
                    - mixtral:8x7b     # large · requires a large GPU (3090 class)
                # Run two replicas on separate nodes (load-balanced, survives a node
                # loss). Degrades gracefully to one replica if GPU nodes are scarce.
                highAvailability: { type: boolean, default: false }
                domain:      { type: string, description: "Hostname for external Ingress + TLS" }
                storageSize: { type: string, default: "20Gi", description: "Ephemeral weight-cache size limit (emptyDir)" }
                # Expose the inference endpoint on a LAN IP (MetalLB LoadBalancer) so
                # workstations can hit the OpenAI-compatible API without DNS/Ingress.
                expose:      { type: boolean, default: false }
            status:
              type: object
              properties:
                endpoint: { type: string }
                model:    { type: string }
