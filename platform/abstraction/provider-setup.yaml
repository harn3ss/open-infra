# What provider-kubernetes needs to actually create resources from a Composition:
#   1. a ProviderConfig telling it to use its own in-cluster identity, and
#   2. RBAC granting that identity permission to manage the composed resources.
#
# RBAC is bound to the crossplane-system service-account GROUP (not a specific SA
# name) so it survives provider upgrades, whose SA name is revision-hashed.
# Applied after Crossplane + the provider install (sync-wave 2); SkipDryRun so it
# applies even before the ProviderConfig CRD is registered.
---
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: InjectedIdentity
---
# Least-privilege-ish: only the resource kinds the Application Composition emits.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openinfra-provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: [services, configmaps, secrets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters]
    verbs: [get, list, watch, create, update, patch, delete]
  # Jobs: the Composition runs an idempotent `mc` job to create MinIO buckets.
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openinfra-provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openinfra-provider-kubernetes
subjects:
  - kind: Group
    name: system:serviceaccounts:crossplane-system
    apiGroup: rbac.authorization.k8s.io
---
# Identity used by the Application Composition's bucket-setup Job to write the
# per-app MinIO credentials secret into application namespaces. Pre-defined here
# (not created per-app) so the provider never needs RBAC-creation power. The Job
# runs in the minio namespace (to read the MinIO root secret via env).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openinfra-bucket-setup
  namespace: minio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openinfra-bucket-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  # Write the per-app MinIO creds secret into any application namespace.
  # (v2: scope to managed app namespaces rather than cluster-wide.)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openinfra-bucket-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openinfra-bucket-setup
subjects:
  - kind: ServiceAccount
    name: openinfra-bucket-setup
    namespace: minio
