# What provider-kubernetes needs to actually create resources from a Composition:
#   1. a ProviderConfig telling it to use its own in-cluster identity, and
#   2. RBAC granting that identity permission to manage the composed resources.
#
# RBAC is bound to the crossplane-system service-account GROUP (not a specific SA
# name) so it survives provider upgrades, whose SA name is revision-hashed.
# Applied after Crossplane + the provider install (sync-wave 2); SkipDryRun so it
# applies even before the ProviderConfig CRD is registered.
---
apiVersion: kubernetes.crossplane.io/v1alpha1
kind: ProviderConfig
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  credentials:
    source: InjectedIdentity
---
# Least-privilege-ish: only the resource kinds the Application Composition emits.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openinfra-provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: [services, configmaps, secrets, resourcequotas, limitranges, persistentvolumeclaims]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [apps]
    resources: [deployments, statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses, networkpolicies]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters]
    verbs: [get, list, watch, create, update, patch, delete]
  # MariaDB for the managed MySQL engine (mariadb-operator). Without this the provider
  # cannot create/observe the MariaDB CR and mysql databases never provision. The operator
  # owns the StatefulSet/User/Database/Services from the MariaDB spec.
  - apiGroups: [k8s.mariadb.com]
    resources: [mariadbs]
    verbs: [get, list, watch, create, update, patch, delete]
  # kind: Group compiles to a ClusterRoleBinding, so the provider must be able to
  # create them. This is an escalation vector — anything that can create a binding
  # can grant any role it is permitted to bind — so it is deliberately fenced:
  #   * bindings themselves: full management, but
  #   * the `bind` verb is restricted by resourceNames to the three console roles.
  # Kubernetes requires `bind` (or holding the role's permissions outright) to
  # reference a ClusterRole in a binding, so this list is the hard ceiling on what
  # a kind: Group can ever grant. Adding a role here widens that ceiling — do it
  # deliberately, and never add cluster-admin.
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterrolebindings]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    verbs: [bind]
    resourceNames:
      - open-infra-console
      - open-infra-poweruser
      - open-infra-readonly

  # kind: Policy / kind: Role compile to ClusterRoles (a labelled one per Policy, an
  # aggregated one per Role), so the provider must be able to write ClusterRoles.
  #
  # THE PERMISSION BOUNDARY. Kubernetes refuses to let you create a ClusterRole granting
  # verbs you do not already hold — unless you hold `escalate`. The provider is granted
  # exactly the openinfra.dev product surface below, and the Policy composition hardcodes
  # apiGroups: [openinfra.dev] into every rule and drops anything outside a 15-resource
  # whitelist. So a Policy can only ever grant a subset of the product surface; a rule
  # outside the boundary is unrepresentable, and even if one were forged the API server
  # would refuse the create. This is the open-infra analogue of an AWS permission boundary.
  #
  # `escalate` on clusterroles IS granted — but only because kind: Role compiles to an
  # AGGREGATED ClusterRole, and Kubernetes requires escalate to create ANY role carrying an
  # aggregationRule (a rule separate from, and not satisfied by, the boundary above). This
  # is deliberately bounded-harmless, and the bound is the `bind` verb, NOT escalate:
  #   * `bind` is resourceName-fenced to the three built-in roles (see above), and
  #   * the provider holds no secrets/RBAC/etc., only the openinfra.dev surface.
  # So even with escalate, the provider can CREATE a ClusterRole granting anything, but it
  # can only BIND to a user a role whose permissions it already holds (i.e. within the
  # openinfra.dev boundary) or one of the three fenced names. Escalate widens what roles can
  # be *created*, never what can be *granted to a person*. Keep it that way: never add a
  # privileged role to the bind resourceNames, and never grant this SA secrets/RBAC verbs.
  - apiGroups: [rbac.authorization.k8s.io]
    resources: [clusterroles]
    verbs: [get, list, watch, create, update, patch, delete, escalate]
  - apiGroups: [openinfra.dev]
    resources:
      - applications
      - functions
      - models
      - virtualmachines
      - vmimages
      - volumes
      - fileshares
      - directories
      - migrations
      - replications
      - dataflows
      - streams
      - securitygroups
      - faultinjections
      - queries
    verbs: [get, list, watch, create, update, patch, delete]

  # Knative Services for the kind: Function (serverless) abstraction.
  - apiGroups: [serving.knative.dev]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  # Jobs: the Composition runs an idempotent `mc` job to create MinIO buckets.
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, update, patch, delete]
  # VirtualMachines for the kind: VirtualMachine (EC2) abstraction. KubeVirt's own
  # controller creates the backing DataVolume/VMI from dataVolumeTemplates, so the
  # provider only manages the VirtualMachine itself (datavolumes listed for safety).
  - apiGroups: [kubevirt.io]
    resources: [virtualmachines, virtualmachineinstances]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [cdi.kubevirt.io]
    resources: [datavolumes]
    verbs: [get, list, watch, create, update, patch, delete]
  # Chaos Mesh experiments for the kind: FaultInjection (Fault Injection Simulator).
  - apiGroups: [chaos-mesh.org]
    resources: [podchaos, networkchaos, stresschaos, timechaos, iochaos, schedules]
    verbs: [get, list, watch, create, update, patch, delete]
  # cert-manager Certificates for the babelfish managed DB's TDS/PG TLS.
  - apiGroups: [cert-manager.io]
    resources: [certificates]
    verbs: [get, list, watch, create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openinfra-provider-kubernetes
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openinfra-provider-kubernetes
subjects:
  - kind: Group
    name: system:serviceaccounts:crossplane-system
    apiGroup: rbac.authorization.k8s.io
---
# Identity used by the Application Composition's bucket-setup Job to write the
# per-app MinIO credentials secret into application namespaces. Pre-defined here
# (not created per-app) so the provider never needs RBAC-creation power. The Job
# runs in the minio namespace (to read the MinIO root secret via env).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openinfra-bucket-setup
  namespace: minio
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openinfra-bucket-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  # Write the per-app MinIO creds secret into any application namespace.
  # (v2: scope to managed app namespaces rather than cluster-wide.)
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openinfra-bucket-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openinfra-bucket-setup
subjects:
  - kind: ServiceAccount
    name: openinfra-bucket-setup
    namespace: minio
