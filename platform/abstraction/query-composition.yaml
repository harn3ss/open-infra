# The compiler for kind: Query -> a serverless-per-query execution (the Athena
# StartQueryExecution model). One Query claim renders one Job that:
#   - ensures the output bucket exists (aws cli against MinIO), then
#   - runs the SQL in a throwaway DuckDB pod (our first-party open-infra-query
#     image), writing results (CSV) + an <id>.metadata.json to the output location.
# The Job runs in the `minio` namespace and uses a LEAST-PRIVILEGE S3 identity
# (secret query-runner-s3, minted by query-runtime.yaml) that can read only an
# allow-list of buckets and write only to query-results — never the MinIO root creds.
# It runs non-root, read-only-rootfs, no service-account token, and inside a
# NetworkPolicy that permits egress only to DNS + MinIO + Trino (query-runtime.yaml).
# Per-namespace creds / workgroups remain a further refinement.
#
# The console derives the queryId (= Job name) + result location and reads the live
# state/stats from the Job + metadata.json (GetQueryExecution). Readiness follows the
# Job via function-auto-ready.
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: query
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XQuery
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $bucket := $spec.outputBucket | default "query-results" }}
            {{- /* Result object key = "<ns>/<name>" — the "/" makes the ns/name split
                   unambiguous, and the console computes the byte-identical key, so
                   there is no hash for two implementations to disagree on. The Job
                   name (k8s, no "/") uses dashes and is capped at 63 chars. */}}
            {{- $jobName := printf "q-%s-%s" $ns $name | trunc 63 }}
            {{- $out := printf "s3://%s/%s/%s.csv" $bucket $ns $name }}
            {{- $img := "ghcr.io/harn3ss/open-infra-query:latest" }}
            {{- $minioEP := "minio.minio.svc.cluster.local:9000" }}
            {{- $engine := $spec.engine | default "duckdb" }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: query-job
            spec:
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: {{ $jobName }}
                    namespace: minio
                    labels:
                      openinfra.dev/query: "true"
                      openinfra.dev/query-claim: {{ $name }}
                      openinfra.dev/query-ns: {{ $ns }}
                  spec:
                    backoffLimit: 1
                    # keep finished Jobs a day so the console can read the outcome, then GC.
                    ttlSecondsAfterFinished: 86400
                    template:
                      metadata: { labels: { openinfra.dev/query: "true" } }
                      spec:
                        restartPolicy: Never
                        # No cluster API access from the query sandbox.
                        automountServiceAccountToken: false
                        # Non-root, seccomp-confined. The result bucket is pre-created by
                        # the query-iam-setup Job, so no root-cred bucket-maker init here.
                        securityContext:
                          runAsNonRoot: true
                          runAsUser: 65532
                          runAsGroup: 65532
                          fsGroup: 65532
                          seccompProfile: { type: RuntimeDefault }
                        containers:
                          - name: query
                            image: {{ $img }}
                            securityContext:
                              allowPrivilegeEscalation: false
                              readOnlyRootFilesystem: true
                              capabilities: { drop: [ALL] }
                            env:
                              - { name: SQL, value: {{ $spec.sql | quote }} }
                              - { name: OUTPUT_S3, value: {{ $out | quote }} }
                              - { name: S3_ENDPOINT, value: {{ $minioEP | quote }} }
                              # Least-privilege query identity (read allow-list + write
                              # query-results only) — NOT the MinIO root creds.
                              - { name: S3_ACCESS_KEY, valueFrom: { secretKeyRef: { name: query-runner-s3, key: accessKey } } }
                              - { name: S3_SECRET_KEY, valueFrom: { secretKeyRef: { name: query-runner-s3, key: secretKey } } }
                              - { name: ENGINE, value: {{ $engine | quote }} }
                              {{- if eq $engine "trino" }}
                              # the warehouse engine (catalog + federation); the runner waits for
                              # it to come up (it idle-stops when unused).
                              - { name: TRINO_URL, value: "http://trino.lakehouse.svc.cluster.local:8080" }
                              - { name: TRINO_CATALOG, value: "iceberg" }
                              {{- end }}
                            volumeMounts:
                              - { name: tmp, mountPath: /tmp }
                        volumes:
                          # RO rootfs — the runner's scratch (DuckDB temp, trino CSV) lives here.
                          - { name: tmp, emptyDir: {} }
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
