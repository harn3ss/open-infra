# The compiler for kind: Query -> a serverless-per-query execution (the Athena
# StartQueryExecution model). One Query claim renders one Job that:
#   - ensures the output bucket exists (aws cli against MinIO), then
#   - runs the SQL in a throwaway DuckDB pod (our first-party open-infra-query
#     image), writing results (CSV) + an <id>.metadata.json to the output location.
# The Job runs in the `minio` namespace so it can read the MinIO root secret via
# env (same pattern as the app bucket-setup). Multi-tenant hardening — per-namespace
# scoped S3 creds / workgroups — is a follow-up; today all queries use the root creds.
#
# The console derives the queryId (= Job name) + result location and reads the live
# state/stats from the Job + metadata.json (GetQueryExecution). Readiness follows the
# Job via function-auto-ready.
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: query
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XQuery
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- /* deterministic per-query id (also the Job name + result filename) */}}
            {{- $qid := printf "q-%s-%s" $name (.observed.composite.resource.metadata.uid | trunc 8) }}
            {{- $bucket := $spec.outputBucket | default "query-results" }}
            {{- $out := printf "s3://%s/%s.csv" $bucket $qid }}
            {{- $img := "ghcr.io/harn3ss/open-infra-query:latest" }}
            {{- $minioEP := "minio.minio.svc.cluster.local:9000" }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: query-job
            spec:
              forProvider:
                manifest:
                  apiVersion: batch/v1
                  kind: Job
                  metadata:
                    name: {{ $qid }}
                    namespace: minio
                    labels:
                      openinfra.dev/query: "true"
                      openinfra.dev/query-claim: {{ $name }}
                      openinfra.dev/query-ns: {{ $ns }}
                  spec:
                    backoffLimit: 1
                    # keep finished Jobs a day so the console can read the outcome, then GC.
                    ttlSecondsAfterFinished: 86400
                    template:
                      metadata: { labels: { openinfra.dev/query: "true" } }
                      spec:
                        restartPolicy: Never
                        initContainers:
                          # ensure the output bucket exists (idempotent).
                          - name: ensure-bucket
                            image: alpine/k8s:1.30.0
                            command: ["/bin/sh", "-c"]
                            args:
                              - aws --endpoint-url http://{{ $minioEP }} s3 mb s3://{{ $bucket }} 2>/dev/null || true
                            env:
                              - { name: AWS_ACCESS_KEY_ID, valueFrom: { secretKeyRef: { name: minio, key: rootUser } } }
                              - { name: AWS_SECRET_ACCESS_KEY, valueFrom: { secretKeyRef: { name: minio, key: rootPassword } } }
                              - { name: AWS_DEFAULT_REGION, value: us-east-1 }
                        containers:
                          - name: query
                            image: {{ $img }}
                            env:
                              - { name: SQL, value: {{ $spec.sql | quote }} }
                              - { name: OUTPUT_S3, value: {{ $out | quote }} }
                              - { name: S3_ENDPOINT, value: {{ $minioEP | quote }} }
                              - { name: S3_ACCESS_KEY, valueFrom: { secretKeyRef: { name: minio, key: rootUser } } }
                              - { name: S3_SECRET_KEY, valueFrom: { secretKeyRef: { name: minio, key: rootPassword } } }
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
