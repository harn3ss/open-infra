# The compiler for kind: VirtualMachine -> a KubeVirt VirtualMachine with a
# persistent CDI disk (cloud image for Linux, a cloned golden image for Windows),
# first-boot config (cloud-init for Linux, cloudbase-init PowerShell for Windows),
# a Service, a connection Secret (<name>-vm: USERNAME/PASSWORD/HOST/PORT/ACCESS),
# and an optional LAN LoadBalancer (SSH 22 / RDP 3389).
#
# OS image + type come from a curated catalog ($catalog below, in sync with the
# XRD enum). The login password is derived deterministically from the composite's
# UID so it is stable across reconciles. Power state (spec.running) maps to
# runStrategy so the console can Start/Stop without the provider reverting it.
#
# Synced after the XRD (sync-wave 3).
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vm
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  compositeTypeRef:
    apiVersion: openinfra.dev/v1
    kind: XVirtualMachine
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: crossplane-contrib-function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $spec := .observed.composite.resource.spec }}
            {{- $labels := .observed.composite.resource.metadata.labels | default dict }}
            {{- $name := (index $labels "crossplane.io/claim-name") | default .observed.composite.resource.metadata.name }}
            {{- $ns := (index $labels "crossplane.io/claim-namespace") | default "default" }}
            {{- $cpu := $spec.cpu | default 2 }}
            {{- $memory := $spec.memory | default "2Gi" }}
            {{- $disk := $spec.diskSize | default "20Gi" }}
            {{- /* running defaults true; explicit hasKey check because Sprig
                   `default` treats boolean false as empty (would force true). */}}
            {{- $running := true }}{{- if hasKey $spec "running" }}{{- $running = $spec.running }}{{- end }}
            {{- $pass := printf "%s-vmpass" .observed.composite.resource.metadata.uid | sha256sum | trunc 20 }}
            {{- /* Curated OS catalog: os -> disk image + type. KEEP IN SYNC with the
                   XRD enum. Linux images are ready-made cloud images (containerdisks)
                   imported by CDI; windows clones the golden image PVC built once
                   built via kind: VmImage (console: VM Images). */}}
            {{- $catalog := dict
                  "ubuntu-24.04"    (dict "image" "quay.io/containerdisks/ubuntu:24.04"    "osType" "linux")
                  "ubuntu-22.04"    (dict "image" "quay.io/containerdisks/ubuntu:22.04"    "osType" "linux")
                  "fedora-40"       (dict "image" "quay.io/containerdisks/fedora:40"       "osType" "linux")
                  "debian-12"       (dict "image" "quay.io/containerdisks/debian:12"       "osType" "linux")
                  "centos-stream-9"     (dict "image" "quay.io/containerdisks/centos-stream:9" "osType" "linux")
                  "windows-server-2019" (dict "image" "" "osType" "windows")
                  "windows-server-2022" (dict "image" "" "osType" "windows")
                  "windows-server-2025" (dict "image" "" "osType" "windows") }}
            {{- $profile := (index $catalog $spec.os) | default (dict "image" "quay.io/containerdisks/ubuntu:24.04" "osType" "linux") }}
            {{- $isWin := eq $profile.osType "windows" }}
            {{- $port := 22 }}{{- $user := "openinfra" }}{{- $proto := "ssh" }}
            {{- if $isWin }}{{- $port = 3389 }}{{- $user = "Administrator" }}{{- $proto = "rdp" }}{{- end }}
            {{- /* Extra TCP ports to publish on the VM's LAN IP (the masquerade NIC
                   forwards all ports to the guest; the Service just advertises these). */}}
            {{- $ports := $spec.ports | default (list) }}
            {{- /* Windows root disk is FIXED at 70Gi and NOT user-selectable: a
                   generalized image's C: can't be reliably auto-grown, so a larger
                   root would only strand unallocated space. Extra Windows storage is
                   added as separate attachable volumes (EBS-style, issue #53). Linux
                   keeps the user's diskSize — cloud-init grows the rootfs to fit. */}}
            {{- if $isWin }}{{- $disk = "70Gi" }}{{- end }}
            {{- $bridge := eq ($spec.network | default "masquerade") "bridge" }}
            {{- /* highAvailability: root disk on Longhorn (migratable RWX block) + live migration */}}
            {{- $ha := $spec.highAvailability | default false }}
            {{- /* adopt an existing root PVC (migration/restore) instead of cloning the image */}}
            {{- $adopt := $spec.existingRootClaim | default "" }}
            {{- /* explicit CPU model for cross-node portability (else host-model / Nehalem when HA) */}}
            {{- $cpuModel := $spec.cpuModel | default "" }}
            ---
            # --- The VM. dataVolumeTemplates provisions the persistent root disk via
            #     CDI (registry import for Linux; clone of the golden PVC for Windows).
            #     runStrategy follows spec.running so Start/Stop is a spec toggle. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: virtualmachine
            spec:
              forProvider:
                manifest:
                  apiVersion: kubevirt.io/v1
                  kind: VirtualMachine
                  metadata:
                    name: {{ $name }}
                    namespace: {{ $ns }}
                    labels:
                      app.kubernetes.io/name: {{ $name }}
                      openinfra.dev/vm: "true"
                      openinfra.dev/os: {{ $spec.os }}
                  spec:
                    runStrategy: {{ if $running }}Always{{ else }}Halted{{ end }}
                    {{- if not $adopt }}
                    dataVolumeTemplates:
                      - metadata:
                          name: {{ $name }}-root
                        spec:
                          storage:
                            accessModes: [{{ if $ha }}ReadWriteMany{{ else }}ReadWriteOnce{{ end }}]
                            {{- if $ha }}
                            volumeMode: Block   # raw block is required for live-migratable Longhorn
                            {{- end }}
                            resources:
                              requests:
                                storage: {{ $disk }}
                            storageClassName: {{ if $ha }}longhorn-migratable{{ else }}local-path{{ end }}
                          source:
                            {{- if $isWin }}
                            # Clone the per-version golden image (build via kind: VmImage).
                            pvc:
                              namespace: openinfra-images
                              name: {{ $spec.os }}-golden
                            {{- else }}
                            registry:
                              url: "docker://{{ $profile.image }}"
                            {{- end }}
                    {{- end }}
                    template:
                      metadata:
                        labels:
                          kubevirt.io/domain: {{ $name }}
                          app.kubernetes.io/name: {{ $name }}
                          {{- /* SecurityGroup membership: launcher pod inherits VMI labels,
                                 so attached SGs' NetworkPolicies select the VM. */}}
                          {{- range $sg := ($spec.securityGroups | default list) }}
                          openinfra.dev/sg-{{ $sg }}: ""
                          {{- end }}
                      spec:
                        {{- if $ha }}
                        # Drain a node -> live-migrate this VM off it (zero downtime) instead
                        # of killing it. Requires the migratable RWX block root disk above.
                        evictionStrategy: LiveMigrate
                        {{- end }}
                        {{- if $bridge }}
                        # Bridge VMs must land where the macvlan parent NIC exists
                        # (label those nodes openinfra.dev/vm-lan=true).
                        affinity:
                          nodeAffinity:
                            requiredDuringSchedulingIgnoredDuringExecution:
                              nodeSelectorTerms:
                                - matchExpressions:
                                    - { key: openinfra.dev/vm-lan, operator: In, values: ["true"] }
                        {{- end }}
                        domain:
                          cpu:
                            cores: {{ $cpu }}
                            {{- if $cpuModel }}
                            model: {{ $cpuModel }}
                            {{- else if $ha }}
                            # Live migration/reschedule needs a CPU model every target node
                            # supports; host-model (default) pins the VM to its source node.
                            # Nehalem is a universally-safe baseline; override per cluster with
                            # spec.cpuModel (e.g. the newest model common to all nodes).
                            model: Nehalem
                            {{- end }}
                          resources:
                            requests:
                              memory: {{ $memory }}
                          {{- if $isWin }}
                          # Windows: q35 BIOS (no EFI — matches the MBR golden image)
                          # + Hyper-V enlightenments for performance.
                          machine:
                            type: q35
                          features:
                            acpi: {}
                            apic: {}
                            hyperv:
                              relaxed: {}
                              vapic: {}
                              spinlocks:
                                spinlocks: 8191
                          clock:
                            utc: {}
                            timer:
                              hpet:
                                present: false
                              hyperv: {}
                          {{- end }}
                          devices:
                            disks:
                              - name: root
                                disk:
                                  bus: virtio
                                bootOrder: 1
                              {{- if $isWin }}
                              # Per-VM OOBE answer file on a sysprep CD: the generalized
                              # golden reads it on first boot, sets the Administrator
                              # password + enables RDP, and auto-completes OOBE.
                              - name: sysprep
                                cdrom:
                                  bus: sata
                              {{- else }}
                              - name: cloudinit
                                disk:
                                  bus: virtio
                              {{- end }}
                            interfaces:
                              - name: default
                                masquerade: {}
                              {{- if $bridge }}
                              # Second NIC bridged onto the physical LAN (macvlan).
                              - name: lan
                                bridge: {}
                              {{- end }}
                            networkInterfaceMultiqueue: true
                        networks:
                          - name: default
                            pod: {}
                          {{- if $bridge }}
                          - name: lan
                            multus:
                              networkName: default/openinfra-lan
                          {{- end }}
                        volumes:
                          - name: root
                            {{- if $adopt }}
                            persistentVolumeClaim:
                              claimName: {{ $adopt }}
                            {{- else }}
                            dataVolume:
                              name: {{ $name }}-root
                            {{- end }}
                          {{- if $isWin }}
                          - name: sysprep
                            sysprep:
                              configMap:
                                name: {{ $name }}-oobe
                          {{- else }}
                          - name: cloudinit
                            cloudInitNoCloud:
                              userData: |-
                                #cloud-config
                                hostname: {{ $name }}
                                users:
                                  - name: {{ $user }}
                                    sudo: ALL=(ALL) NOPASSWD:ALL
                                    shell: /bin/bash
                                    lock_passwd: false
                                    {{- if $spec.sshKey }}
                                    ssh_authorized_keys:
                                      - {{ $spec.sshKey }}
                                    {{- end }}
                                ssh_pwauth: true
                                chpasswd:
                                  expire: false
                                  list: |
                                    {{ $user }}:{{ $pass }}
                                packages:
                                  - qemu-guest-agent
                                runcmd:
                                  - [systemctl, enable, --now, qemu-guest-agent]
                              {{- if $bridge }}
                              # DHCP both NICs: eth0 (pod) + eth1 (LAN bridge).
                              networkData: |
                                version: 2
                                ethernets:
                                  eth0: { dhcp4: true }
                                  eth1: { dhcp4: true }
                              {{- end }}
                          {{- end }}
            {{- if $isWin }}
            ---
            # --- Windows OOBE answer file (per-VM): the generalized golden reads this
            #     sysprep CD on first boot to set the Administrator password + enable
            #     RDP, then auto-completes OOBE. Each clone gets its own password. ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: oobe
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata: { name: {{ $name }}-oobe, namespace: {{ $ns }} }
                  data:
                    # NB: a DEPLOYED generalized image's oobeSystem pass reads
                    # `unattend.xml` from removable media — NOT `autounattend.xml`
                    # (that name is only honored by Setup during windowsPE). Validated.
                    unattend.xml: |
                      <?xml version="1.0" encoding="utf-8"?>
                      <unattend xmlns="urn:schemas-microsoft-com:unattend">
                        <settings pass="oobeSystem">
                          <component name="Microsoft-Windows-International-Core" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                            <InputLocale>en-US</InputLocale><SystemLocale>en-US</SystemLocale><UILanguage>en-US</UILanguage><UserLocale>en-US</UserLocale>
                          </component>
                          <component name="Microsoft-Windows-Shell-Setup" processorArchitecture="amd64" publicKeyToken="31bf3856ad364e35" language="neutral" versionScope="nonSxS">
                            <UserAccounts><AdministratorPassword><Value>{{ $pass }}</Value><PlainText>true</PlainText></AdministratorPassword></UserAccounts>
                            <OOBE><HideEULAPage>true</HideEULAPage><HideLocalAccountScreen>true</HideLocalAccountScreen><HideOnlineAccountScreens>true</HideOnlineAccountScreens><HideWirelessSetupInOOBE>true</HideWirelessSetupInOOBE><NetworkLocation>Work</NetworkLocation><ProtectYourPC>3</ProtectYourPC></OOBE>
                            <TimeZone>UTC</TimeZone>
                            <FirstLogonCommands>
                              <SynchronousCommand wcm:action="add" xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"><Order>1</Order><CommandLine>cmd /c reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f</CommandLine></SynchronousCommand>
                              <SynchronousCommand wcm:action="add" xmlns:wcm="http://schemas.microsoft.com/WMIConfig/2002/State"><Order>2</Order><CommandLine>netsh advfirewall firewall set rule group="remote desktop" new enable=Yes</CommandLine></SynchronousCommand>
                            </FirstLogonCommands>
                          </component>
                        </settings>
                      </unattend>
            {{- end }}
            ---
            # --- Service: in-cluster reach to SSH (Linux) / RDP (Windows). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: service
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata: { name: {{ $name }}, namespace: {{ $ns }} }
                  spec:
                    selector: { kubevirt.io/domain: {{ $name }} }
                    ports:
                      - { name: {{ $proto }}, port: {{ $port }}, targetPort: {{ $port }} }
                      {{- range $p := $ports }}
                      - { name: "{{ ($p.protocol | default "TCP") | lower }}{{ $p.port }}", port: {{ $p.port }}, targetPort: {{ $p.port }}, protocol: {{ $p.protocol | default "TCP" }} }
                      {{- end }}
            ---
            # --- Connection Secret: how to log in (cf. the DB/model secret). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: vm-secret
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Secret
                  metadata: { name: {{ $name }}-vm, namespace: {{ $ns }} }
                  stringData:
                    OS: "{{ $spec.os }}"
                    PROTOCOL: "{{ $proto }}"
                    USERNAME: "{{ $user }}"
                    PASSWORD: "{{ $pass }}"
                    HOST: "{{ $name }}.{{ $ns }}.svc.cluster.local"
                    PORT: "{{ $port }}"
                    {{- if $isWin }}
                    ACCESS: "mstsc /v:HOST:{{ $port }}  (user {{ $user }})"
                    {{- else }}
                    ACCESS: "ssh {{ $user }}@HOST"
                    {{- end }}
            {{- if or $spec.expose $ports }}
            ---
            # --- LAN LoadBalancer (MetalLB): reach the VM from workstations. One IP
            #     carries the access port (SSH/RDP) plus any spec.ports (e.g. 80/443). ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              annotations:
                gotemplating.fn.crossplane.io/composition-resource-name: vm-lan
            spec:
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $name }}-lan
                    namespace: {{ $ns }}
                    labels: { openinfra.dev/vm-lan: {{ $name }} }
                  spec:
                    type: LoadBalancer
                    # Preserve the client's real source IP so SecurityGroup CIDR rules
                    # can actually match LAN clients on these published ports (without
                    # this, MetalLB SNATs the source to a node IP and CIDR rules can't
                    # distinguish callers). MetalLB L2 announces from the VM's node.
                    externalTrafficPolicy: Local
                    selector: { kubevirt.io/domain: {{ $name }} }
                    ports:
                      - { name: {{ $proto }}, port: {{ $port }}, targetPort: {{ $port }} }
                      {{- range $p := $ports }}
                      - { name: "{{ ($p.protocol | default "TCP") | lower }}{{ $p.port }}", port: {{ $p.port }}, targetPort: {{ $p.port }}, protocol: {{ $p.protocol | default "TCP" }} }
                      {{- end }}
            {{- end }}
    - step: ready
      functionRef:
        name: crossplane-contrib-function-auto-ready
