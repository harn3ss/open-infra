# open-infra's "EC2": a third public API, kind: VirtualMachine. Give it an OS from
# the curated catalog and get a real VM (KubeVirt) with a persistent disk (CDI),
# cloud-init/cloudbase-init login, a web VNC console, and SSH (Linux) or RDP
# (Windows) access — provisioned the same way kind: Application provisions apps.
# KEEP THIS SCHEMA STABLE — it is part of the product's contract.
#
# Synced after Crossplane's CRDs exist (sync-wave 2).
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xvirtualmachines.openinfra.dev
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  group: openinfra.dev
  names:
    kind: XVirtualMachine
    plural: xvirtualmachines
  claimNames:
    kind: VirtualMachine   # what users write in infra.yaml
    plural: virtualmachines
  defaultCompositionRef:
    name: vm
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [os]
              properties:
                # Curated OS catalog (allowlist). Each entry maps to a disk image +
                # osType in the Composition's $catalog. Linux entries are ready-made
                # cloud images (containerdisks); windows-server-* clone a golden image
                # built via kind: VmImage (console: Virtual Machines -> VM Images).
                # Adding an OS means adding it here AND to the Composition's $catalog.
                os:
                  type: string
                  description: "Operating system (from the curated catalog)."
                  enum:
                    - ubuntu-24.04         # linux · cloud image
                    - ubuntu-22.04         # linux · cloud image
                    - fedora-40            # linux · cloud image
                    - debian-12            # linux · cloud image
                    - centos-stream-9      # linux · cloud image
                    - windows-server-2019  # windows · clones <os>-golden (build via kind: VmImage)
                    - windows-server-2022  # windows
                    - windows-server-2025  # windows
                cpu:      { type: integer, default: 2, minimum: 1, description: "vCPU cores" }
                memory:   { type: string, default: "2Gi", description: "Guest RAM" }
                diskSize: { type: string, default: "20Gi", description: "Root disk size (persistent)" }
                # SSH public key injected via cloud-init (Linux). If omitted, a
                # generated password (in the connection secret) is the only login.
                sshKey:   { type: string, description: "SSH public key for login (Linux)" }
                # Reach the VM on a LAN IP (MetalLB): SSH (22) for Linux, RDP (3389)
                # for Windows. Off by default — port-forward / web console otherwise.
                expose:   { type: boolean, default: false }
                # Extra TCP/UDP ports to publish on the VM's LAN IP, beyond the access
                # port (SSH/RDP) — e.g. [{port: 80}, {port: 53, protocol: UDP}]. They
                # ride the same MetalLB IP as SSH/RDP (one LAN IP, the ports you pick).
                # Setting any port also gives the VM a LAN IP (implies expose). The
                # console's VM → Network tab manages this list.
                ports:
                  type: array
                  items:
                    type: object
                    required: [port]
                    properties:
                      port:     { type: integer, description: "Port number (1–65535)." }
                      protocol: { type: string, enum: [TCP, UDP], default: TCP }
                  description: "Extra ports on the VM's LAN IP, e.g. [{port: 80}, {port: 53, protocol: UDP}]."
                # Network attachment:
                #   masquerade (default) — VM behind the pod network (NAT); reach it
                #     in-cluster via its Service, or from the LAN via expose/MetalLB.
                #   bridge — VM joins the physical LAN directly via Multus+macvlan and
                #     pulls a real DHCP lease (a first-class LAN host, no MetalLB/NAT).
                #     Requires networking.vmLan enabled at install (Multus) and nodes
                #     labelled openinfra.dev/vm-lan=true. See docs/virtual-machines.md.
                network:
                  type: string
                  enum: [masquerade, bridge]
                  default: masquerade
                securityGroups:
                  type: array
                  items: { type: string }
                  description: "Names of SecurityGroups (firewall rule sets) to attach to this VM."
                # Power state. The console's Start/Stop flips this; the Composition
                # maps it to KubeVirt runStrategy (Always/Halted). Disk is retained
                # when stopped. Kept in spec (not a subresource) so it stays GitOps-
                # clean and the provider doesn't fight power changes.
                running:  { type: boolean, default: true }
                # Node-independent storage + live migration. When true the root disk is
                # provisioned on Longhorn (migratable RWX block, replicated across nodes)
                # and the VM gets evictionStrategy: LiveMigrate, so it survives a node loss
                # (reschedule + boot) and live-migrates off a drained node with zero downtime.
                # Default false = local-path NVMe (faster, but pinned to one node).
                highAvailability: { type: boolean, default: false }
                # Boot from an EXISTING root PVC instead of cloning a fresh disk from the OS
                # image. Used to migrate/restore a VM onto a pre-populated disk (e.g. a disk
                # cloned onto Longhorn). When set, no root DataVolume is provisioned.
                existingRootClaim: { type: string }
                # Guest CPU model. Empty = host-model (best perf, but pins the VM to its node's
                # CPU). For live migration / node-loss recovery across heterogeneous CPUs, set
                # the newest model common to all nodes (e.g. Broadwell-noTSX). HA VMs default to
                # Nehalem if unset.
                cpuModel: { type: string }
            status:
              type: object
              properties:
                os:      { type: string }
                ip:      { type: string }
                ready:   { type: boolean }
