# Boot-assist for Windows image builds. UEFI shows "Press any key to boot from
# CD or DVD..." and times out headless, so the installer never boots. This SA +
# script let a per-build Job (in the vmimage Composition) send Enter over the
# installer VM's VNC during boot, dismissing the prompt so the CD boots.
#
# Synced with the abstraction (sync-wave 2).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openinfra-bootkey
  namespace: openinfra-images
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openinfra-bootkey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  # Send keystrokes to an installer VM's graphical console (VNC subresource).
  - apiGroups: [subresources.kubevirt.io]
    resources: [virtualmachineinstances/vnc]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openinfra-bootkey
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: openinfra-bootkey
subjects:
  - kind: ServiceAccount
    name: openinfra-bootkey
    namespace: openinfra-images
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openinfra-bootkey
  namespace: openinfra-images
  annotations:
    argocd.argoproj.io/sync-wave: "2"
data:
  bootkey.py: |
    # Spam Enter over the installer VM's VNC to dismiss the UEFI "Press any key
    # to boot from CD or DVD" prompt so the unattended Windows install starts.
    # Connects to the in-cluster virt-api VNC subresource (raw RFB under the
    # plain.kubevirt.io subprotocol), does the minimal RFB handshake, sends an
    # Enter key event, repeats. Tolerates the VMI not being up yet (ISO import).
    import os, time, struct, websocket
    ns  = os.environ.get("NAMESPACE", "openinfra-images")
    vmi = os.environ["VMI_NAME"]
    tok = open("/var/run/secrets/kubernetes.io/serviceaccount/token").read().strip()
    ca  = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
    url = ("wss://kubernetes.default.svc/apis/subresources.kubevirt.io/v1"
           f"/namespaces/{ns}/virtualmachineinstances/{vmi}/vnc")
    B = websocket.ABNF.OPCODE_BINARY
    ENTER = 0xFF0D

    def press():
        ws = websocket.create_connection(
            url, subprotocols=["plain.kubevirt.io"], timeout=8,
            header=["Authorization: Bearer " + tok],
            sslopt={"ca_certs": ca})
        buf = b""
        def rd(n):
            nonlocal buf
            while len(buf) < n:
                d = ws.recv()
                buf += d if isinstance(d, bytes) else d.encode("latin1")
            r, buf = buf[:n], buf[n:]
            return r
        ws.send(rd(12), B)                                  # ProtocolVersion echo
        rd(rd(1)[0]); ws.send(b"\x01", B); rd(4)            # security None + result
        ws.send(b"\x01", B)                                 # ClientInit (shared)
        si = rd(24); rd(struct.unpack(">I", si[20:24])[0])  # ServerInit + name
        ws.send(struct.pack(">BBHI", 4, 1, 0, ENTER), B)    # key down
        ws.send(struct.pack(">BBHI", 4, 0, 0, ENTER), B)    # key up
        ws.close()

    # ~9 min: covers the CDI ISO import delay, then the boot-prompt window.
    for i in range(108):
        try:
            press(); print(f"[{i}] sent Enter", flush=True)
        except Exception as e:
            print(f"[{i}] waiting: {type(e).__name__}", flush=True)
        time.sleep(5)
