# The public API of open-infra. This CompositeResourceDefinition turns the
# user-facing `kind: Application` (apiVersion openinfra.dev/v1) into a Crossplane
# composite. KEEP THIS SCHEMA STABLE — it is the product's contract; the engine
# behind it may change but users' infra.yaml must keep working.
#
# Synced after Crossplane's CRDs exist (sync-wave 2).
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xapplications.openinfra.dev
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    # Crossplane's CRDs are installed by the crossplane child app (wave -1);
    # skip dry-run validation so this applies even before the CRD is registered.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  group: openinfra.dev
  names:
    kind: XApplication
    plural: xapplications
  claimNames:
    kind: Application        # what users write in infra.yaml
    plural: applications
  defaultCompositionRef:
    name: application
  versions:
    - name: v1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              # No hard-required fields: an Application is usually image+port, but it
              # may be "data-only" (just a database/storage/queues block) — e.g. a
              # database hand-rolled from the console. The workload renders only when
              # an image is set.
              properties:
                image:   { type: string, description: "Container image (omit for a data-only app)" }
                port:    { type: integer, description: "Container port the app listens on" }
                domain:  { type: string, description: "Hostname for Ingress + TLS + DNS" }
                scaling:
                  type: object
                  properties:
                    min: { type: integer, default: 1 }
                    max: { type: integer, default: 5 }
                    targetCPUPercent: { type: integer, default: 70 }
                database:
                  type: object
                  properties:
                    # postgres -> CloudNativePG (relational, injects DATABASE_URL).
                    # mongo    -> FerretDB on DocumentDB-Postgres (document store,
                    #             Mongo wire protocol, injects MONGODB_URI). Apache-2.0.
                    engine: { type: string, enum: [postgres, mongo], default: postgres }
                    name:   { type: string }
                    # postgres: primary + standby on separate nodes with automatic
                    # failover (CloudNativePG). mongo: scales the stateless FerretDB
                    # proxy tier (storage-tier failover is a tracked follow-up).
                    # Needs >=2 nodes. Default false = single instance (fine for dev).
                    highAvailability: { type: boolean, default: false }
                storage:
                  type: object
                  properties:
                    buckets: { type: array, items: { type: string } }
                queues:
                  type: array
                  items: { type: string }
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:  { type: string }
                      value: { type: string }
                secrets:
                  type: array
                  items: { type: string }
                  description: "Names mounted from Sealed Secrets"
            status:
              type: object
              properties:
                url: { type: string }
