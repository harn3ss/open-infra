# Console Deployment — single replica Go BFF + React SPA.
# Image is built and pushed to GHCR by the open-infra CI pipeline.
# For prod, pin to a digest or a semver tag instead of "latest".
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  namespace: open-infra-console
  labels:
    app: console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
    spec:
      serviceAccountName: console

      # Run as a non-privileged, non-root UID (distroless "nonroot" uid).
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532

      containers:
        - name: console
          image: ghcr.io/harn3ss/open-infra-console:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          env:
            # Console authentication. Chosen at install time:
            #   local (default) — users in the console-auth Secret, bcrypt hashed. On
            #                     first start a root password is generated and printed
            #                     ONCE to this pod's log; grab it, then rotate by
            #                     deleting the Secret.
            #   ldap / oidc     — reserved (next phase).
            #   none            — NO authentication. Only for throwaway dev clusters:
            #                     /api/k8s/* proxies the Kubernetes API with this pod's
            #                     ServiceAccount, so anyone who can reach it is admin.
            - name: AUTH_MODE
              value: "local"
            - name: CLUSTER_NAME
              value: "open-infra"
            # Same-origin Grafana embedding: the BFF reverse-proxies /grafana/* to
            # the in-cluster Grafana (which serves_from_sub_path under /grafana),
            # and the SPA embeds dashboards at the relative /grafana. No CORS, no
            # cross-origin cookies, no site-specific URL.
            - name: GRAFANA_BASE_URL
              value: "/grafana"
            - name: GRAFANA_PROXY_TARGET
              value: "http://kube-prometheus-stack-grafana.monitoring.svc.cluster.local"
            # Loki, for the Audit view (queries the shipped k3s audit log + console iam logs).
            - name: LOKI_URL
              value: "http://loki.monitoring.svc.cluster.local:3100"

          # Lightweight probes on the /healthz endpoint exposed by the Go BFF.
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
