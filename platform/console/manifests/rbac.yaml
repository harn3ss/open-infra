# RBAC for the open-infra console.
#
# This is intentionally NOT cluster-admin. The console is a read-mostly UI;
# write verbs are granted only for the specific kinds users can create through
# the console's "create resource" flow (ConfigMaps, Deployments, Services) and
# for the product CRD (openinfra.dev/applications).
#
# Operators who need the console to manage additional resource types can extend
# this ClusterRole with an additional ClusterRole + aggregation label, e.g.:
#   metadata.labels: { rbac.open-infra.dev/extend-console: "true" }
#   aggregationRule.clusterRoleSelectors:
#     - matchLabels: { rbac.open-infra.dev/extend-console: "true" }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: open-infra-console
rules:
  # ── Core: read workload-relevant objects cluster-wide ──────────────────────
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - events
      - pods
      - pods/log
      - services
      - configmaps
      - persistentvolumeclaims
    verbs: [get, list, watch]

  # ── Apps: read higher-level workload objects ───────────────────────────────
  - apiGroups: [apps]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]

  # ── Networking: read ingress routes + network policies (the Network view).
  #    LoadBalancer Services come from the core "services" rule above. ─────────
  - apiGroups: [networking.k8s.io]
    resources:
      - ingresses
      - networkpolicies
    verbs: [get, list, watch]

  # ── Secrets: read by name only (no list/watch, so the console can't enumerate
  #    all secrets). Used to surface connection info — a Model's API key for the
  #    in-console playground, a Database's connection URI. ─────────────────────
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get]

  # ── apiextensions: read CRD schemas (for the schema explorer UI) ──────────
  - apiGroups: [apiextensions.k8s.io]
    resources:
      - customresourcedefinitions
    verbs: [get, list, watch]

  # ── Argo CD: read Application status so the console can show sync state ───
  - apiGroups: [argoproj.io]
    resources:
      - applications
    verbs: [get, list, watch]

  # ── openinfra.dev: full CRUD on the product CRDs (the console is the primary
  #    interface for creating/updating/deleting Applications, Functions, Models,
  #    VirtualMachines). VM Start/Stop is a patch of the claim's spec.running. ─
  - apiGroups: [openinfra.dev]
    resources:
      - applications
      - functions
      - models
      - virtualmachines
      - vmimages
    verbs: [get, list, watch, create, update, patch, delete]

  # ── KubeVirt + CDI: read VM/guest/disk status for the Virtual Machines view
  #    (IP, phase, import progress). The VM objects themselves are created via the
  #    openinfra.dev claim above; these are read-only live status. ──────────────
  - apiGroups: [kubevirt.io]
    resources:
      - virtualmachines
      - virtualmachineinstances
    verbs: [get, list, watch]
  - apiGroups: [cdi.kubevirt.io]
    resources:
      - datavolumes
    verbs: [get, list, watch]

  # ── CloudNativePG: read managed Postgres clusters (the Databases view) ──────
  - apiGroups: [postgresql.cnpg.io]
    resources:
      - clusters
    verbs: [get, list, watch]

  # ── Core write verbs for "create resource" UI (common kinds only) ──────────
  # These verbs let the console create/delete ConfigMaps and Services so basic
  # resource management works without broader cluster-admin rights. Extend via
  # an aggregated ClusterRole if more kinds are needed in your environment.
  - apiGroups: [""]
    resources:
      - configmaps
      - services
    verbs: [create, update, patch, delete]

  - apiGroups: [apps]
    resources:
      - deployments
    verbs: [create, update, patch, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: open-infra-console
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: open-infra-console
subjects:
  - kind: ServiceAccount
    name: console
    namespace: open-infra-console
---
# Narrow cross-namespace read: the console SA may GET only the MinIO root secret
# (in the minio namespace) so the BFF can reach MinIO's S3 API for the Buckets
# browser. Scoped to the single named secret — nothing else in that namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: open-infra-console-minio
  namespace: minio
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [minio]
    verbs: [get]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: open-infra-console-minio
  namespace: minio
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: open-infra-console-minio
subjects:
  - kind: ServiceAccount
    name: console
    namespace: open-infra-console
