# CloudNativePG — managed Postgres ("RDS"). Installs the operator only; per-app
# Postgres clusters are provisioned by the Application abstraction (Crossplane).
# IMPORTANT: app databases must use a LOCAL NVMe storage class (local-path),
# never CIFS/NFS — DBs on network filesystems corrupt and stall.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.23.2   # operator 1.25.1 (single-minor step from 1.24.1; unlocks synchronous.dataDurability)
    helm:
      values: |
        crds:
          create: true
        resources:
          requests: { cpu: 100m, memory: 100Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply so the large Pooler CRD isn't dropped by the 256KB
    # last-applied-configuration annotation limit on client-side apply.
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
