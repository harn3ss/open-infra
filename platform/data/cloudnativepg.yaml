# CloudNativePG — managed Postgres ("RDS"). Installs the operator only; per-app
# Postgres clusters are provisioned by the Application abstraction (Crossplane).
# IMPORTANT: app databases must use a LOCAL NVMe storage class (local-path),
# never CIFS/NFS — DBs on network filesystems corrupt and stall.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.22.1
    helm:
      values: |
        crds:
          create: true
        resources:
          requests: { cpu: 100m, memory: 100Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
