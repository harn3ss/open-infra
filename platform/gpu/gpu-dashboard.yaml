# GPU observability dashboard, auto-imported by the kube-prometheus-stack Grafana
# sidecar (label grafana_dashboard=1). Uses the metrics exported by dcgm-exporter
# (DCGM_FI_DEV_*), labelled per node (Hostname), GPU index (gpu) and model
# (modelName). Shows utilization, VRAM, temperature and power per GPU.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openinfra-gpu-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  gpu-overview.json: |
    {
      "uid": "openinfra-gpu-overview",
      "title": "open-infra / GPU Overview",
      "tags": ["open-infra", "gpu"],
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "GPU Utilization",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "{{Hostname}} · {{modelName}} · gpu{{gpu}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "GPU Memory Used (VRAM)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "DCGM_FI_DEV_FB_USED * 1024 * 1024",
              "legendFormat": "{{Hostname}} · {{modelName}} · gpu{{gpu}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "GPU Temperature",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "celsius" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "DCGM_FI_DEV_GPU_TEMP",
              "legendFormat": "{{Hostname}} · {{modelName}} · gpu{{gpu}}"
            }
          ]
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "GPU Power Draw",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": { "defaults": { "unit": "watt" }, "overrides": [] },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "{{Hostname}} · {{modelName}} · gpu{{gpu}}"
            }
          ]
        }
      ]
    }
