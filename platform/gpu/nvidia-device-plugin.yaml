# NVIDIA device plugin — advertises `nvidia.com/gpu` on GPU nodes so the scheduler
# can place GPU workloads (and the console can show GPU capacity). The host
# drivers + nvidia-container-toolkit are a prerequisite (installed out-of-band on
# the GPU nodes); this only exposes the GPUs to Kubernetes.
#
# Runs only on nodes labeled openinfra.dev/gpu=true (currently cake = RTX A2000,
# mlbox = RTX 3090), using the nvidia RuntimeClass.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://nvidia.github.io/k8s-device-plugin
    chart: nvidia-device-plugin
    targetRevision: 0.17.3
    helm:
      values: |
        runtimeClassName: nvidia
        nodeSelector:
          openinfra.dev/gpu: "true"
  destination:
    server: https://kubernetes.default.svc
    namespace: nvidia-device-plugin
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
