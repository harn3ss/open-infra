# Observability ("CloudWatch"): Prometheus + Grafana + Alertmanager.
# Pair with Loki (loki.yaml) for logs. Grafana is the "console".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 62.3.0
    helm:
      values: |
        grafana:
          defaultDashboardsEnabled: true
          # admin password via Sealed Secret in prod
          # Allow the open-infra console to embed dashboards (iframe, kiosk mode)
          # and serve them read-only without a login. Tighten auth.anonymous for
          # internet-exposed clusters (or front Grafana via the console BFF).
          grafana.ini:
            security:
              allow_embedding: true
            auth.anonymous:
              enabled: true
              org_role: Viewer
        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests: { memory: 512Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]   # CRDs are large
