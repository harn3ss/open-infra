# Observability ("CloudWatch"): Prometheus + Grafana + Alertmanager.
# Pair with Loki (loki.yaml) for logs. Grafana is the "console".
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 62.3.0
    helm:
      values: |
        grafana:
          defaultDashboardsEnabled: true
          # admin password via Sealed Secret in prod
          # Loki datasource so logs are queryable in Grafana (Explore) and the
          # console — Prometheus/Alertmanager are auto-provisioned by the chart.
          additionalDataSources:
            - name: Loki
              type: loki
              uid: loki
              access: proxy
              url: http://loki.monitoring.svc.cluster.local:3100
              jsonData:
                maxLines: 1000
          # Allow the open-infra console to embed dashboards (iframe, kiosk mode)
          # and serve them read-only without a login. Tighten auth.anonymous for
          # internet-exposed clusters (or front Grafana via the console BFF).
          grafana.ini:
            security:
              allow_embedding: true
            auth.anonymous:
              enabled: true
              org_role: Viewer
            # Serve under /grafana so the console BFF can reverse-proxy it
            # same-origin (no CORS, no cross-origin cookies). The console embeds
            # dashboards at /grafana/d/<uid>.
            server:
              serve_from_sub_path: true
              root_url: "%(protocol)s://%(domain)s/grafana"
        prometheus:
          prometheusSpec:
            retention: 7d
            resources:
              requests: { memory: 512Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]   # CRDs are large
