# Bootstrap the lakehouse (Trino + Iceberg REST catalog) without committing any secret:
# a one-shot Job, run in the `minio` namespace where the MinIO root secret lives, that
#   1. ensures the `lakehouse` bucket exists on MinIO (the Iceberg warehouse root), and
#   2. mints a LEAST-PRIVILEGE MinIO user (`openinfra-lakehouse`) whose policy grants
#      read+write ONLY to s3://lakehouse, and writes it to lakehouse/minio-creds (AWS_*
#      key names) that iceberg-rest and trino reference. The engines never see the
#      MinIO root creds, so a lakehouse compromise can't reach other platform buckets.
# alpine/k8s carries `kubectl`; we fetch `mc` (only it can mint scoped users/policies).
# Idempotent (kubectl apply / mb-if-missing / stable user key) and it retries until the
# MinIO root secret exists. Runs as an Argo Sync hook at an earlier sync-wave than the
# catalog/engine Deployments, so the secret is present before they start.
apiVersion: v1
kind: Namespace
metadata:
  name: lakehouse
  annotations:
    argocd.argoproj.io/sync-wave: "0"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: lakehouse-setup
  namespace: minio
  annotations:
    argocd.argoproj.io/sync-wave: "1"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: lakehouse-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: lakehouse-setup
  annotations:
    argocd.argoproj.io/sync-wave: "1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: lakehouse-setup
subjects:
  - kind: ServiceAccount
    name: lakehouse-setup
    namespace: minio
---
apiVersion: batch/v1
kind: Job
metadata:
  name: lakehouse-setup
  namespace: minio
  annotations:
    # Sync hook at wave 2: Argo waits for it to complete before the wave-3
    # catalog/engine Deployments apply, so lakehouse/minio-creds already exists.
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 30
  template:
    spec:
      serviceAccountName: lakehouse-setup
      restartPolicy: OnFailure
      volumes:
        - { name: mc, emptyDir: {} }
      initContainers:
        # mc offline from the minio/mc image — no runtime download to hang the sync.
        - name: fetch-mc
          image: minio/mc:latest
          command: [sh, -c, "cp /usr/bin/mc /mc/mc && chmod +x /mc/mc"]
          volumeMounts: [{ name: mc, mountPath: /mc }]
      containers:
        - name: setup
          image: alpine/k8s:1.30.0   # kubectl (native); mc from the shared volume
          command: [/bin/sh, -c]
          volumeMounts: [{ name: mc, mountPath: /mc }]
          env:
            - { name: ROOT_USER, valueFrom: { secretKeyRef: { name: minio, key: rootUser } } }
            - { name: ROOT_PASS, valueFrom: { secretKeyRef: { name: minio, key: rootPassword } } }
            - { name: MINIO_URL, value: "http://minio.minio.svc.cluster.local:9000" }
          args:
            - |
              set -eu
              [ -n "$ROOT_USER" ] && [ -n "$ROOT_PASS" ] || { echo "waiting for MinIO secret…"; exit 1; }
              echo "minting scoped lakehouse identity…"
              MC=/mc/mc
              "$MC" alias set m "$MINIO_URL" "$ROOT_USER" "$ROOT_PASS" >/dev/null

              # 1. the Iceberg warehouse bucket (s3://lakehouse/warehouse lives under it)
              "$MC" mb --ignore-existing m/lakehouse >/dev/null

              # 2. least-privilege policy: read+write ONLY the lakehouse bucket
              cat > /tmp/policy.json <<'EOF'
              { "Version": "2012-10-17", "Statement": [
                { "Effect": "Allow",
                  "Action": ["s3:GetObject","s3:PutObject","s3:DeleteObject","s3:ListBucket"],
                  "Resource": ["arn:aws:s3:::lakehouse","arn:aws:s3:::lakehouse/*"] }
              ] }
              EOF
              "$MC" admin policy create m openinfra-lakehouse /tmp/policy.json 2>/dev/null \
                || "$MC" admin policy update m openinfra-lakehouse /tmp/policy.json 2>/dev/null || true

              # 3. scoped user (stable key across reruns) -> lakehouse/minio-creds
              AK="openinfra-lakehouse"
              SK=$(kubectl get secret minio-creds -n lakehouse -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' 2>/dev/null | base64 -d || true)
              [ -n "$SK" ] || SK=$(head -c 48 /dev/urandom | md5sum | cut -c1-32)
              "$MC" admin user add m "$AK" "$SK" >/dev/null 2>&1 || "$MC" admin user add m "$AK" "$SK" >/dev/null
              "$MC" admin policy attach m openinfra-lakehouse --user "$AK" >/dev/null 2>&1 || true

              kubectl create namespace lakehouse --dry-run=client -o yaml | kubectl apply -f -
              kubectl create secret generic minio-creds -n lakehouse \
                --from-literal=AWS_ACCESS_KEY_ID="$AK" \
                --from-literal=AWS_SECRET_ACCESS_KEY="$SK" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "lakehouse bootstrap ready"
