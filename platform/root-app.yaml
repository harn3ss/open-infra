# app-of-apps root: one Argo Application that installs every platform component.
# install.sh patches __REPO_URL__ / __PATH__ at apply time (no private values here).
# Each child component lives as its own Argo Application under platform/<area>/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-infra-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: __REPO_URL__
    targetRevision: HEAD
    path: __PATH__
    directory:
      recurse: true
      # Pick up only the component Application manifests (one level per area).
      # Raw CRs (e.g. abstraction/config/*) are synced by their own child app.
      include: '{networking,storage,data,observability,security,abstraction,console,gpu,serverless,backup,resilience,query}/*.yaml'
      # Nested manifests/ dirs are deployed by their own child app (e.g. the
      # console), not applied directly by the root app; security/apiserver/ holds
      # API-server config files (the audit policy) that are read off disk and are
      # not cluster resources at all. install.sh substitutes __EXCLUDE__ with this
      # base list plus disabled components and the unused MinIO variant
      # (storage/minio.yaml vs storage/minio-ha.yaml — exactly one is included).
      #
      # (e.g. security/apiserver/audit-policy.yaml, abstraction/policy-boundary.yaml —
      # the latter is CI-only tooling config read by a go test, not cluster state).
      # NOTE: Argo's globs do NOT treat `/` as a separator, so `*` spans path
      # segments — `security/*.yaml` matches `security/apiserver/audit-policy.yaml`.
      # Putting a file in a subdirectory therefore does NOT hide it; it has to be
      # excluded by name. A manifest of a kind the API server doesn't serve fails
      # validation, and Argo aborts the WHOLE sync when any task is invalid.
      exclude: '__EXCLUDE__'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
