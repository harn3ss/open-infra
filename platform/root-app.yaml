# app-of-apps root: one Argo Application that installs every platform component.
# install.sh patches __REPO_URL__ / __PATH__ at apply time (no private values here).
# Each child component lives as its own Argo Application under platform/<area>/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-infra-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: __REPO_URL__
    targetRevision: HEAD
    path: __PATH__
    directory:
      recurse: true
      # Pick up only the component Application manifests (one level per area).
      # Raw CRs (e.g. abstraction/config/*) are synced by their own child app.
      include: '{networking,storage,data,observability,security,abstraction,console,gpu,serverless,backup}/*.yaml'
      # Nested manifests/ dirs are deployed by their own child app (e.g. the
      # console), not applied directly by the root app. install.sh rewrites this
      # glob to also drop disabled components and the unused MinIO variant
      # (storage/minio.yaml vs storage/minio-ha.yaml — exactly one is included).
      exclude: '**/manifests/**'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
