# Wire Longhorn's backup target to MinIO without committing any secret: a one-shot
# Job copies the MinIO root credentials into longhorn-system as longhorn-minio-creds
# (which Longhorn's defaultBackupStore references). Idempotent (kubectl apply) and
# retries until the MinIO secret exists. The bucket itself is pre-created by the
# MinIO chart (storage/minio.yaml). sync-wave 2 = after MinIO + Longhorn.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: longhorn-backup-setup
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "2"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: longhorn-backup-setup
  annotations:
    argocd.argoproj.io/sync-wave: "2"
rules:
  - apiGroups: [""]
    resources: [secrets]
    verbs: [get, create, update, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: longhorn-backup-setup
  annotations:
    argocd.argoproj.io/sync-wave: "2"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: longhorn-backup-setup
subjects:
  - kind: ServiceAccount
    name: longhorn-backup-setup
    namespace: longhorn-system
---
apiVersion: batch/v1
kind: Job
metadata:
  name: longhorn-backup-setup
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    # Re-run when the manifest changes; don't block sync waiting on it.
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 30
  template:
    spec:
      serviceAccountName: longhorn-backup-setup
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: bitnami/kubectl
          command: [sh, -c]
          args:
            - |
              set -e
              RU=$(kubectl get secret minio -n minio -o jsonpath='{.data.rootUser}' | base64 -d)
              RP=$(kubectl get secret minio -n minio -o jsonpath='{.data.rootPassword}' | base64 -d)
              [ -n "$RU" ] && [ -n "$RP" ] || { echo "waiting for MinIO secret…"; exit 1; }
              kubectl create secret generic longhorn-minio-creds -n longhorn-system \
                --from-literal=AWS_ACCESS_KEY_ID="$RU" \
                --from-literal=AWS_SECRET_ACCESS_KEY="$RP" \
                --from-literal=AWS_ENDPOINTS="http://minio.minio.svc:9000" \
                --dry-run=client -o yaml | kubectl apply -f -
              echo "longhorn-minio-creds ready"
---
# Self-heal: the one-shot Job above only runs on Argo sync, so if MinIO's root
# creds ROTATE (e.g. a MinIO reinstall regenerates the secret), longhorn-minio-creds
# goes stale and the backup target fails with InvalidAccessKeyId — silently breaking
# every Longhorn backup (and thus DB/VM final-snapshots). This CronJob re-copies the
# current root creds periodically so the backup target recovers on its own.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: longhorn-backup-creds-refresh
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          serviceAccountName: longhorn-backup-setup
          restartPolicy: OnFailure
          containers:
            - name: refresh
              image: bitnami/kubectl
              command: [sh, -c]
              args:
                - |
                  set -e
                  RU=$(kubectl get secret minio -n minio -o jsonpath='{.data.rootUser}' | base64 -d)
                  RP=$(kubectl get secret minio -n minio -o jsonpath='{.data.rootPassword}' | base64 -d)
                  [ -n "$RU" ] && [ -n "$RP" ] || { echo "MinIO secret not ready"; exit 1; }
                  cur=$(kubectl get secret longhorn-minio-creds -n longhorn-system \
                        -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' 2>/dev/null | base64 -d || true)
                  if [ "$cur" = "$RU" ]; then echo "creds already current"; exit 0; fi
                  echo "MinIO root creds changed — refreshing longhorn-minio-creds"
                  kubectl create secret generic longhorn-minio-creds -n longhorn-system \
                    --from-literal=AWS_ACCESS_KEY_ID="$RU" \
                    --from-literal=AWS_SECRET_ACCESS_KEY="$RP" \
                    --from-literal=AWS_ENDPOINTS="http://minio.minio.svc:9000" \
                    --dry-run=client -o yaml | kubectl apply -f -
