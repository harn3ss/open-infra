# CSI snapshot classes for Longhorn (used by kind: Volume snapshots/restores).
#   longhorn-snapshot (type=snap) — in-cluster Longhorn snapshot (fast, default).
#   longhorn-backup   (type=bak)  — also writes the snapshot to the backup target
#                                   (MinIO), i.e. EBS-to-S3 durability.
# sync-wave 2 so the longhorn CSI driver exists first.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: longhorn-snapshot
  labels:
    openinfra.dev/default-vsc: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
driver: driver.longhorn.io
deletionPolicy: Delete
parameters:
  type: snap
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: longhorn-backup
  annotations:
    argocd.argoproj.io/sync-wave: "2"
driver: driver.longhorn.io
deletionPolicy: Delete
parameters:
  type: bak
