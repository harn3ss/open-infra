# In-cluster CSI snapshot class for Longhorn — used by kind: Volume snapshots and
# restores (type=snap = a Longhorn snapshot stored in-cluster). A backup class
# (type=bak, writes to the MinIO backup target) can be added once the backup
# target is configured. sync-wave 2 so the longhorn CSI driver exists first.
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: longhorn-snapshot
  labels:
    openinfra.dev/default-vsc: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "2"
driver: driver.longhorn.io
deletionPolicy: Delete
parameters:
  type: snap
