# MinIO (HA variant) — distributed object storage. Selected by install.sh when
# config.yaml `storage.highAvailability: true`; otherwise storage/minio.yaml
# (standalone) is used. Exactly one of the two is included in the app-of-apps.
#
# Distributed = 4 erasure-coded drives pinned to the always-on nodes (cakenas +
# cake-precision), 2 per node — so powering down mlbox (the GPU box) never drops
# MinIO below write quorum. Trade-off: losing one of those two nodes also drops
# below write quorum (acceptable — they stay up). NOT for single-node dev.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: 5.2.0
    helm:
      values: |
        mode: distributed
        replicas: 4
        persistence:
          enabled: true
          size: 20Gi
          # storageClass left default; for NAS reuse, bind a pre-made PV instead.
        resources:
          requests: { memory: 512Mi }
        # Pin drives to the always-on nodes (cakenas + cake-precision); never mlbox
        # (the GPU box that gets powered down) — otherwise stopping it drops MinIO
        # below write quorum. Soft anti-affinity then spreads the 4 drives 2-per-node.
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: In
                      values: [cakenas, cake-precision-5820-tower-x-series]
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels: { app: minio }
        # Root creds come from a Sealed Secret in prod; chart default for dev only.
        consoleService:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
