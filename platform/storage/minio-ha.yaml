# MinIO (HA variant) — distributed object storage. Selected by install.sh when
# config.yaml `storage.highAvailability: true`; otherwise storage/minio.yaml
# (standalone) is used. Exactly one of the two is included in the app-of-apps.
#
# Distributed = 4 erasure-coded drives, 2 per storage node. Drives are pinned (via
# the openinfra.dev/storage=true node label) to your always-on storage nodes, so an
# ephemeral node powering down never drops MinIO below write quorum. Label at least
# two nodes first:  kubectl label node <a> <b> openinfra.dev/storage=true
# NOT for single-node dev (use storage/minio.yaml).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: 5.2.0
    helm:
      values: |
        mode: distributed
        replicas: 4
        persistence:
          enabled: true
          size: 20Gi
          # storageClass left default; for NAS reuse, bind a pre-made PV instead.
        resources:
          requests: { memory: 512Mi }
        # Pin drives to nodes labelled openinfra.dev/storage=true (your always-on
        # storage nodes), never ephemeral ones — otherwise stopping a node drops
        # MinIO below write quorum. Soft anti-affinity then spreads the 4 drives.
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: openinfra.dev/storage
                      operator: In
                      values: ["true"]
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels: { app: minio }
        # Root creds come from a Sealed Secret in prod; chart default for dev only.
        consoleService:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
