# MinIO — object storage ("S3"). S3-API compatible. Can reuse an existing NAS
# data dir via a hostPath/PV (set storage.shared.minioDataPath in config.yaml and
# wire a PersistentVolume; not committed because the path is site-specific).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://charts.min.io/
    chart: minio
    targetRevision: 5.2.0
    helm:
      values: |
        # Distributed (HA): 4 erasure-coded drives across nodes. Survives a
        # single node loss (EC tolerates losing up to half the drives). On a
        # 3-node cluster one node holds 2 drives. For single-node dev, set
        # mode: standalone + replicas: 1.
        mode: distributed
        replicas: 4
        persistence:
          enabled: true
          size: 20Gi
          # storageClass left default; for NAS reuse, bind a pre-made PV instead.
        resources:
          requests: { memory: 512Mi }
        # Spread drives across nodes so a node loss doesn't take out a quorum.
        affinity:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels: { app: minio }
        # Root creds come from a Sealed Secret in prod; chart default for dev only.
        consoleService:
          type: ClusterIP
  destination:
    server: https://kubernetes.default.svc
    namespace: minio
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
